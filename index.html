function ld(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function dkey(d){return d.toISOString().split("T")[0];}
function todayStr(){return dkey(new Date());}
function dateOfAdvDay(n){const d=new Date("2026-04-03");d.setDate(d.getDate()+n-1);return dkey(d);}
function advDayNum(){const diff=Math.floor((new Date()-new Date("2026-04-03"))/86400000)+1;return Math.max(1,Math.min(diff,40));}

function todayPhaseId(){
  const now=new Date();
  for(const p of PHASES){
    if(p.startDate&&p.endDate&&now>=new Date(p.startDate)&&now<=new Date(p.endDate))return p.id;
  }
  if(now<new Date(PHASES[0].startDate))return 1;
  if(now>new Date(PHASES[1].endDate))return 3;
  return 2;
}

function PasswordScreen({onUnlock}){
  const [val,setVal]=useState(""); const [err,setErr]=useState(false);
  const [shake,setShake]=useState(false); const [tries,setTries]=useState(0);
  const ref=useRef(null);
  useEffect(()=>{if(ref.current)ref.current.focus();},[]);
  function attempt(){
    if(val===PASSWORD){onUnlock();}
    else{setErr(true);setShake(true);setTries(t=>t+1);setVal("");setTimeout(()=>setShake(false),400);}
  }
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
      <div className="fadeup" style={{width:"100%",maxWidth:"380px"}}>
        <div style={{textAlign:"center",marginBottom:"40px"}}>
          <div style={{fontSize:"9px",letterSpacing:"5px",color:"#334155",marginBottom:"10px"}}>◈ PRIVATE ACCESS</div>
          <div style={{fontSize:"clamp(24px,6vw,38px)",fontWeight:900,letterSpacing:"-2px",lineHeight:1}}>KARTIKEY</div>
          <div style={{fontSize:"clamp(24px,6vw,38px)",fontWeight:900,letterSpacing:"-2px",color:"#f59e0b",lineHeight:1}}>BHARDWAJ</div>
          <div style={{fontSize:"9px",color:"#1e293b",marginTop:"10px",letterSpacing:"3px"}}>JEE MAINS + ADVANCED SYSTEM</div>
        </div>
        <div className={shake?"shake":""}>
          <div style={{fontSize:"9px",letterSpacing:"3px",color:"#475569",marginBottom:"8px"}}>ACCESS CODE</div>
          <input ref={ref} type="password" value={val}
            onChange={e=>{setVal(e.target.value);setErr(false);}}
            onKeyDown={e=>{if(e.key==="Enter")attempt();}}
            placeholder="••••••••"
            style={{width:"100%",padding:"14px 16px",background:"#0d1117",
              border:`1px solid ${err?"#ef4444":"#1e293b"}`,color:"#e2e8f0",
              fontSize:"18px",letterSpacing:"6px",textAlign:"center",outline:"none",transition:"border-color 0.2s"}}/>
        </div>
        {err&&<div className="fadeup" style={{margin:"10px 0",padding:"10px",background:"#ef444412",border:"1px solid #ef444433",fontSize:"11px",color:"#f87171",textAlign:"center"}}>
          ✕ WRONG CODE{tries>=3&&<span style={{color:"#7f1d1d"}}> — hint: your warrior's name</span>}
        </div>}
        <button onClick={attempt}
          onMouseOver={e=>{e.currentTarget.style.background="#f59e0b";e.currentTarget.style.color="#000";}}
          onMouseOut={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color="#f59e0b";}}
          style={{width:"100%",marginTop:"6px",padding:"13px",background:"transparent",border:"1px solid #f59e0b",color:"#f59e0b",fontSize:"12px",letterSpacing:"3px",fontWeight:700,transition:"all 0.2s"}}>
          ◈ UNLOCK PLANNER
        </button>
        <div style={{textAlign:"center",marginTop:"16px",fontSize:"9px",color:"#111827",letterSpacing:"2px"}}>PRIVATE · DO NOT SHARE</div>
      </div>
    </div>
  );
}

  const isUnlockable=!examDate||today>examDate;
  const daysUntil=examDate&&today<=examDate?Math.ceil((examDate-today)/86400000):0;

  useEffect(()=>{ if(ref.current&&isUnlockable)ref.current.focus(); },[isUnlockable]);

  function attempt(){
    if(val===ADV_PASSWORD){onUnlock();}
    else{setErr(true);setShake(true);setTries(t=>t+1);setVal("");setTimeout(()=>setShake(false),400);}

            <div style={{display:"flex",gap:"8px"}}>
              <button onClick={saveDate} style={{flex:1,padding:"8px",background:"transparent",border:"1px solid #f59e0b",color:"#f59e0b",fontSize:"10px",letterSpacing:"2px",fontWeight:700}}>✓ SAVE</button>
              <button onClick={()=>setEditingDate(false)} style={{padding:"8px 12px",background:"transparent",border:"1px solid #1e293b",color:"#475569",fontSize:"10px"}}>CANCEL</button>
            </div>
          </div>
        )}
      </Card>

      {/* Countdown or unlock */}
      {!isUnlockable?(
        <div style={{textAlign:"center",padding:"28px",background:"#0d1117",border:"1px solid #1e293b"}}>
          <div style={{fontSize:"9px",letterSpacing:"3px",color:"#475569",marginBottom:"10px"}}>PHASE 3 UNLOCKS AFTER YOUR MAINS</div>
          <div style={{fontSize:"60px",fontWeight:900,color:"#ec4899",lineHeight:1}}>{daysUntil}</div>
          <div style={{fontSize:"11px",color:"#475569",marginTop:"6px"}}>day{daysUntil!==1?"s":""} until your exam</div>
          <div style={{fontSize:"10px",color:"#334155",marginTop:"14px"}}>Come back the day after your exam — Phase 3 password will be available then</div>
        </div>
      ):(
        <>
          <div style={{fontSize:"9px",letterSpacing:"3px",color:"#34d399",marginBottom:"14px",textAlign:"center"}}>
            {examDate?"✓ MAINS DONE — ENTER PHASE 3 CODE":"◈ ENTER PHASE 3 CODE"}
          </div>
          <div className={shake?"shake":""}>
            <div style={{fontSize:"9px",letterSpacing:"3px",color:"#475569",marginBottom:"8px"}}>PHASE 3 ACCESS CODE</div>
            <input ref={ref} type="password" value={val}
              onChange={e=>{setVal(e.target.value);setErr(false);}}
              onKeyDown={e=>{if(e.key==="Enter")attempt();}}
              placeholder="••••••••••"
              style={{width:"100%",padding:"13px 16px",background:"#0d1117",border:`1px solid ${err?"#ef4444":"#1e293b"}`,color:"#e2e8f0",fontSize:"16px",letterSpacing:"5px",textAlign:"center",outline:"none"}}/>
          </div>
          {err&&<div style={{margin:"10px 0",padding:"10px",background:"#ef444412",border:"1px solid #ef444433",fontSize:"11px",color:"#f87171",textAlign:"center"}}>
            ✕ WRONG CODE{tries>=2&&<span style={{color:"#7f1d1d"}}> — hint: JEEADVANCE (all caps)</span>}
          </div>}
          <button onClick={attempt}
            onMouseOver={e=>{e.currentTarget.style.background="#ec4899";e.currentTarget.style.color="#000";}}
            onMouseOut={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color="#ec4899";}}
            style={{width:"100%",marginTop:"8px",padding:"12px",background:"transparent",border:"1px solid #ec4899",color:"#ec4899",fontSize:"11px",letterSpacing:"3px",fontWeight:700,transition:"all 0.2s"}}>
            ◈ UNLOCK PHASE 3
          </button>
        </>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   PLANNER TAB
═══════════════════════════════════════════════════════ */
function PlannerTab({advUnlocked,onAdvUnlock,mainsDate,onSetMainsDate}){
  const [activePhase,setActivePhase]=useState(todayPhaseId);
  const [viewDay,setViewDay]=useState(1);
  const [expanded,setExpanded]=useState(null);
  const [checks,setChecks]=useState(()=>ld("jee_checks",{}));
  const [doneDays,setDoneDays]=useState(()=>ld("jee_done",{}));

  useEffect(()=>{
    const pid=activePhase;
    const p=PHASES[pid-1];
    if(!p.startDate){setViewDay(1);return;}
    const diff=Math.floor((new Date()-new Date(p.startDate))/86400000)+1;
    setViewDay(Math.max(1,Math.min(diff,p.days)));
  },[activePhase]);

  const phase=PHASES[activePhase-1];
  const isAdv=phase.isAdvanced;

  // figure out day string for selected day
  function getDayStr(pid,day){
    const p=PHASES[pid-1];
    if(!p.startDate)return null;
    const d=new Date(p.startDate);d.setDate(d.getDate()+day-1);return dkey(d);
  }
  const viewDayStr=getDayStr(activePhase,viewDay);
  const testForDay=isAdv
    ? ADV_TESTS.find(t=>t.date===viewDayStr)
    : MAINS_TESTS.find(t=>t.date===viewDayStr);

  const taskKey=`p${activePhase}_d${viewDay}`;
  const completedN=Object.keys(doneDays).filter(k=>k.startsWith(`p${activePhase}`)).length;

  let tasks;
  if(isAdv) tasks=testForDay?ADV_TEST_TASKS:ADV_TASKS;
  else if(activePhase===1) tasks=testForDay?MAINS_TEST_TASKS:MAINS_TASKS_P1;
  else tasks=testForDay?MAINS_TEST_TASKS:MAINS_TASKS_P2;

  const sched=testForDay?(isAdv?ADV_TEST_SCHED:MAINS_TEST_SCHED):phase.schedule;

  function togCheck(i){const n={...checks,[`${taskKey}_${i}`]:!checks[`${taskKey}_${i}`]};setChecks(n);sv("jee_checks",n);}
  function markDone(){const n={...doneDays,[taskKey]:true};setDoneDays(n);sv("jee_done",n);}
  function switchPhase(id){setActivePhase(id);setExpanded(null);}

  const phaseColor=phase.color;

  return(
    <div className="fadeup">
      {/* Phase tabs */}
      <div style={{display:"flex",gap:"8px",marginBottom:"20px",flexWrap:"wrap"}}>
        {PHASES.map(p=>{
          const active=activePhase===p.id; const isNow=p.id===todayPhaseId();
          return(
            <button key={p.id} onClick={()=>switchPhase(p.id)}
              style={{padding:"8px 14px",border:`1px solid ${active?p.color:"#1e293b"}`,
                background:active?`${p.color}18`:"transparent",color:active?p.color:"#475569",
                fontSize:"11px",letterSpacing:"2px",fontWeight:active?700:400,transition:"all 0.2s"}}>
              {p.id===3&&!advUnlocked?"🔒 ":""}PHASE {p.id}
              {isNow&&<span style={{marginLeft:"6px",fontSize:"8px",background:p.color,color:"#000",padding:"1px 5px"}}>NOW</span>}
            </button>
          );
        })}
      </div>

      {/* Phase 3 locked gate */}
      {activePhase===3&&!advUnlocked&&<AdvPasswordGate onUnlock={onAdvUnlock} mainsDate={mainsDate} onSetMainsDate={onSetMainsDate}/>}

      {/* Content */}
      {(activePhase!==3||advUnlocked)&&(
        <>
          {/* Stats */}
          <div className="sgrid" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"10px",marginBottom:"18px"}}>
            {[
              {l:"HRS / DAY",v:`${sched.reduce((a,s)=>a+s.hours,0)}h`,    c:phaseColor},
              {l:"DAYS DONE",v:`${completedN}/${phase.days}`,             c:"#34d399"},
              {l:"SUBJECTS", v:isAdv?"3 + 180 Qs":phase.schedule.length, c:"#a78bfa"},
              {l:"PROGRESS", v:`${Math.round((completedN/phase.days)*100)}%`,c:"#f59e0b"},
            ].map(s=>(
              <Card key={s.l}><div style={{fontSize:"9px",letterSpacing:"2px",color:"#475569",marginBottom:"4px"}}>{s.l}</div><div style={{fontSize:"20px",fontWeight:900,color:s.c}}>{s.v}</div></Card>
            ))}
          </div>
          <div style={{height:"3px",background:"#1e293b",marginBottom:"22px"}}>
            <div style={{height:"100%",width:`${(completedN/phase.days)*100}%`,background:`linear-gradient(90deg,${phaseColor},${phase.accent})`,transition:"width 0.5s"}}/>
          </div>

          <div className="twocol" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"20px"}}>
            {/* LEFT — schedule */}
            <div>
              <Lbl>DAY {viewDay} SCHEDULE {testForDay?`— ${testForDay.label}`:""}</Lbl>
              {testForDay&&(
                <div style={{marginBottom:"12px",padding:"10px 14px",background:`${phaseColor}0a`,border:`1px solid ${phaseColor}44`}}>
                  <div style={{fontSize:"10px",color:phaseColor,fontWeight:700,letterSpacing:"2px",display:"flex",alignItems:"center",gap:"8px"}}>
                    ⚡ TEST DAY — {testForDay.label}
                    <Tag color={testForDay.type==="Offline"?"#f59e0b":"#60a5fa"}>{testForDay.type}</Tag>
                  </div>
                  <div style={{fontSize:"9px",color:"#475569",marginTop:"3px"}}>Log score in TESTS tab after</div>
                </div>
              )}
              {sched.map((s,i)=>(
                <div key={i} onClick={()=>!testForDay&&setExpanded(expanded===s.subject?null:s.subject)}
                  style={{marginBottom:"10px",padding:"13px",background:"#0d1117",
                    border:`1px solid ${expanded===s.subject?s.color:"#1e293b"}`,
                    cursor:testForDay?"default":"pointer",transition:"border-color 0.2s"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                      <span style={{fontSize:"18px"}}>{s.icon||"◈"}</span>
                      <div>
                        <div style={{fontWeight:700,fontSize:"12px",color:s.color}}>{s.subject}</div>
                        {s.detail&&<div style={{fontSize:"10px",color:"#475569",marginTop:"1px"}}>{s.detail}</div>}
                      </div>
                    </div>
                    <div style={{fontSize:"20px",fontWeight:900,color:s.color}}>{s.hours}h</div>
                  </div>
                  <div style={{marginTop:"8px",height:"3px",background:"#1e293b"}}>
                    <div style={{height:"100%",width:`${(s.hours/10)*100}%`,background:s.color}}/>
                  </div>
                  {expanded===s.subject&&s.breakdown&&(
                    <div style={{marginTop:"10px",paddingTop:"10px",borderTop:"1px solid #1e293b"}}>
                      {s.breakdown.map((b,j)=>(
                        <div key={j} style={{fontSize:"11px",color:"#94a3b8",padding:"3px 0",display:"flex",gap:"8px"}}>
                          <span style={{color:s.color}}>→</span>{b}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              ))}
              <Card>
                <Lbl>PHASE NOTES</Lbl>
                {phase.tips.map((t,i)=>(
                  <div key={i} style={{fontSize:"11px",color:"#64748b",padding:"4px 0",display:"flex",gap:"8px"}}>
                    <span style={{color:phaseColor}}>◈</span>{t}
                  </div>
                ))}
              </Card>
            </div>

            {/* RIGHT — tracker */}
            <div>
              <Lbl>DAY TRACKER ({phase.days} DAYS)</Lbl>
              <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(10,phase.days)},1fr)`,gap:"3px",marginBottom:"8px"}}>
                {Array.from({length:phase.days}).map((_,i)=>{
                  const d=i+1; const done=doneDays[`p${activePhase}_d${d}`];
                  const isV=viewDay===d;
                  const dStr=getDayStr(activePhase,d);
                  const tests=isAdv?ADV_TESTS:MAINS_TESTS;
                  const hasT=dStr?tests.some(t=>t.date===dStr):false;
                  const isToday=dStr===todayStr();
                  return(
                    <button key={d} onClick={()=>setViewDay(d)}
                      style={{aspectRatio:"1",fontSize:"8px",fontWeight:isV?900:400,
                        display:"flex",alignItems:"center",justifyContent:"center",
                        border:`1px solid ${isV?phaseColor:done?"#1a3a2a":hasT?`${phaseColor}55`:isToday?`${phaseColor}33`:"#1e293b"}`,
                        background:done?"#0d2a1a":hasT?`${phaseColor}0a`:isV?`${phaseColor}18`:isToday?`${phaseColor}06`:"#0d1117",
                        color:done?"#34d399":isV?phaseColor:hasT?phaseColor:isToday?phaseColor:"#475569"}}>
                      {done?"✓":hasT?"T":d}
                    </button>
                  );
                })}
              </div>
              <div style={{fontSize:"9px",color:"#475569",marginBottom:"12px"}}>
                <span style={{color:phaseColor}}>T</span> = test &nbsp;·&nbsp; <span style={{color:"#34d399"}}>✓</span> = done
              </div>

              <Card style={{marginBottom:"12px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
                  <div style={{fontSize:"11px",letterSpacing:"2px",color:phaseColor,fontWeight:700}}>DAY {viewDay}{testForDay?" (TEST)":""}</div>
                  {doneDays[taskKey]&&<Tag color="#34d399">✓ DONE</Tag>}
                </div>
                {tasks.map((task,i)=>{
                  const chk=checks[`${taskKey}_${i}`];
                  return(
                    <div key={i} onClick={()=>togCheck(i)} style={{display:"flex",gap:"10px",alignItems:"flex-start",padding:"7px 0",borderBottom:i<tasks.length-1?"1px solid #0f172a":"none",cursor:"pointer"}}>
                      <div style={{width:"14px",height:"14px",minWidth:"14px",marginTop:"1px",border:`1px solid ${chk?"#34d399":"#334155"}`,background:chk?"#0d2a1a":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                        {chk&&<span style={{color:"#34d399",fontSize:"9px"}}>✓</span>}
                      </div>
                      <span style={{fontSize:"11px",color:chk?"#475569":"#94a3b8",textDecoration:chk?"line-through":"none",lineHeight:1.5}}>{task}</span>
                    </div>
                  );
                })}
                {!doneDays[taskKey]&&(
                  <button onClick={markDone}
                    onMouseOver={e=>e.currentTarget.style.background=`${phaseColor}22`}
                    onMouseOut={e=>e.currentTarget.style.background="transparent"}
                    style={{width:"100%",marginTop:"14px",padding:"10px",background:"transparent",border:`1px solid ${phaseColor}`,color:phaseColor,fontSize:"11px",letterSpacing:"2px",fontWeight:700,transition:"background 0.2s"}}>
                    ◈ MARK DAY {viewDay} COMPLETE
                  </button>
                )}
              </Card>

              {/* Hours breakdown */}
              <Card>
                <Lbl>HOURS TODAY</Lbl>
                {sched.map(s=>(
                  <div key={s.subject} style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}>
                    <div style={{width:"72px",fontSize:"10px",color:s.color}}>{s.subject}</div>
                    <div style={{flex:1,height:"5px",background:"#1e293b"}}>
                      <div style={{height:"100%",width:`${(s.hours/10)*100}%`,background:s.color}}/>
                    </div>
                    <div style={{fontSize:"11px",color:s.color,width:"28px",textAlign:"right"}}>{s.hours}h</div>
                  </div>
                ))}
                <div style={{marginTop:"10px",paddingTop:"10px",borderTop:"1px solid #1e293b",display:"flex",justifyContent:"space-between",fontSize:"12px"}}>
                  <span style={{color:"#475569",letterSpacing:"2px"}}>TOTAL</span>
                  <span style={{color:phaseColor,fontWeight:900}}>{sched.reduce((a,s)=>a+s.hours,0)} hrs</span>
                </div>
              </Card>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   TESTS TAB  (Mains + Advanced, both with Online/Offline)
═══════════════════════════════════════════════════════ */
function TestsTab({advUnlocked}){
  const [section,setSection]=useState("mains");
  const [scores,setScores]=useState(()=>ld("jee_scores",{}));
  const [advScores,setAdvScores]=useState(()=>ld("adv_scores",{}));
  const [checks,setChecks]=useState(()=>ld("jee_tc",{}));
  const [sel,setSel]=useState(null);

  const MAINS_SUBJ=["Physics","Maths","Chemistry"];
  const ADV_SUBJ  =["Physics","Chemistry","Maths"];

  // ── Mains helpers ──
  function mainsTotal(id){
    const vals=MAINS_SUBJ.map(s=>scores[`${id}_${s}`]).filter(v=>v!==null&&v!==undefined);
    return vals.length?vals.reduce((a,b)=>a+b,0):null;
  }
  function setMainsScore(id,s,v){const n={...scores,[`${id}_${s}`]:v};setScores(n);sv("jee_scores",n);}

  // ── Adv helpers ──
  function advTotal(id){
    const vals=ADV_SUBJ.map(s=>advScores[`${id}_${s}`]).filter(v=>v!==null&&v!==undefined);
    return vals.length===3?vals.reduce((a,b)=>a+b,0):null;
  }
  function setAdvScore(id,s,v){const n={...advScores,[`${id}_${s}`]:v};setAdvScores(n);sv("adv_scores",n);}

  function togCheck(id,i,prefix){const k=`${prefix}_${id}_${i}`;const n={...checks,[k]:!checks[k]};setChecks(n);sv("jee_tc",n);}
  function getChk(id,i,prefix){return checks[`${prefix}_${id}_${i}`];}

  const today=todayStr();
  const mainsDone=MAINS_TESTS.filter(t=>mainsTotal(t.id)!==null);
  const advDone  =ADV_TESTS.filter(t=>advTotal(t.id)!==null);

  function TestCard({test,getTotal,setScore,scoreKey,subjList,maxPer,rankFn,taskList,prefix,targets}){
    const tDate=new Date(test.date);
    const isPast=tDate<new Date()&&test.date!==today;
    const isToday=test.date===today;
    const tot=getTotal(test.id); const r=tot!==null?rankFn(tot):null;
    const isOpen=sel===`${prefix}_${test.id}`;
    return(
      <div onClick={()=>setSel(isOpen?null:`${prefix}_${test.id}`)}
        style={{background:"#0d1117",padding:"12px",cursor:"pointer",transition:"border-color 0.2s",
          border:`1px solid ${isOpen?(prefix==="m"?"#3b82f6":"#ec4899"):isToday?(prefix==="m"?"#3b82f655":"#ec489955"):tot!==null?"#1a3a2a":"#1e293b"}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{flex:1,marginRight:"8px"}}>
            <div style={{fontSize:"11px",fontWeight:700,marginBottom:"3px",
              color:isToday?(prefix==="m"?"#3b82f6":"#ec4899"):tot!==null?"#e2e8f0":isPast?"#475569":"#94a3b8",
              display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap"}}>
              {test.label}
              {isToday&&<Tag color={prefix==="m"?"#3b82f6":"#ec4899"}>TODAY</Tag>}
            </div>
            <div style={{display:"flex",gap:"6px",alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontSize:"9px",color:"#475569"}}>
                {tDate.toLocaleDateString("en-IN",{day:"numeric",month:"short"})}
              </span>
              <Tag color={test.type==="Offline"?"#f59e0b":"#60a5fa"}>{test.type}</Tag>
              {test.tags&&<Tag color="#475569">{test.tags}</Tag>}
            </div>
          </div>
          <div style={{textAlign:"right",minWidth:"56px"}}>
            {tot!==null
              ?<><div style={{fontSize:"18px",fontWeight:900,color:r.color}}>{tot}</div><div style={{fontSize:"8px",color:r.color,letterSpacing:"1px"}}>{r.label}</div></>
              :<div style={{fontSize:"9px",color:"#334155"}}>{isPast?"NO SCORE":"UPCOMING"}</div>}
          </div>
        </div>
        {tot!==null&&<div style={{marginTop:"8px",height:"2px",background:"#1e293b"}}><div style={{height:"100%",width:`${(tot/(maxPer*3))*100}%`,background:r.color}}/></div>}

        {isOpen&&(
          <div onClick={e=>e.stopPropagation()} style={{marginTop:"12px",paddingTop:"12px",borderTop:"1px solid #1e293b"}}>
            <div style={{fontSize:"9px",letterSpacing:"2px",color:"#475569",marginBottom:"10px"}}>
              SCORES {targets?`(Phy ${targets.Physics.target}+ · Chem ${targets.Chemistry.target}+ · Math ${targets.Maths.target}+)`:"(out of 100 each)"}
            </div>
            <div style={{display:"flex",gap:"10px",flexWrap:"wrap",alignItems:"flex-end",marginBottom:"14px"}}>
              {subjList.map(s=>{
                const tgt=targets?targets[s]:null;
                const c=s==="Physics"?"#60a5fa":s==="Maths"?"#a78bfa":"#34d399";
                const val=scoreKey(test.id,s);
                const hit=tgt&&val!==null&&val!==undefined&&val>=tgt.target;
                return(
                  <div key={s} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}}>
                    <div style={{fontSize:"9px",color:c,letterSpacing:"1px"}}>{s.slice(0,4).toUpperCase()}</div>
                    {tgt&&<div style={{fontSize:"8px",color:"#334155"}}>/{tgt.max}</div>}
                    <input type="number" min="0" max={tgt?tgt.max:100} placeholder="—"
                      value={val!==null&&val!==undefined?val:""}
                      onChange={e=>setScore(test.id,s,e.target.value===""?null:Number(e.target.value))}
                      style={{width:"58px",background:"transparent",border:`1px solid ${val?c:"#1e293b"}`,color:val?c:"#475569",fontSize:"13px",fontWeight:700,padding:"4px 6px",textAlign:"center",outline:"none"}}/>
                    {tgt&&val!==null&&val!==undefined&&(
                      <Tag color={hit?"#34d399":"#f87171"}>{hit?"✓":`-${tgt.target-val}`}</Tag>
                    )}
                  </div>
                );
              })}
              {tot!==null&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}}>
                <div style={{fontSize:"9px",color:"#f59e0b",letterSpacing:"1px"}}>TOTAL</div>
                <div style={{fontSize:"22px",fontWeight:900,color:r.color}}>{tot}</div>
                <Tag color={r.color}>{r.label}</Tag>
              </div>}
            </div>
            <div style={{fontSize:"9px",letterSpacing:"2px",color:"#475569",marginBottom:"8px"}}>POST-TEST TASKS</div>
            {taskList.map((task,i)=>{
              const chk=getChk(test.id,i,prefix);
              return(
                <div key={i} onClick={()=>togCheck(test.id,i,prefix)} style={{display:"flex",gap:"8px",alignItems:"flex-start",padding:"5px 0",borderBottom:i<taskList.length-1?"1px solid #0f172a":"none",cursor:"pointer"}}>
                  <div style={{width:"12px",height:"12px",minWidth:"12px",marginTop:"1px",border:`1px solid ${chk?"#34d399":"#334155"}`,background:chk?"#0d2a1a":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {chk&&<span style={{color:"#34d399",fontSize:"8px"}}>✓</span>}
                  </div>
                  <span style={{fontSize:"10px",color:chk?"#475569":"#94a3b8",textDecoration:chk?"line-through":"none"}}>{task}</span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  return(
    <div className="fadeup">
      {/* Section switcher */}
      <div style={{display:"flex",gap:"8px",marginBottom:"20px"}}>
        <button onClick={()=>setSection("mains")}
          style={{padding:"8px 16px",border:`1px solid ${section==="mains"?"#3b82f6":"#1e293b"}`,background:section==="mains"?"#3b82f618":"transparent",color:section==="mains"?"#3b82f6":"#475569",fontSize:"11px",letterSpacing:"2px",fontWeight:section==="mains"?700:400,transition:"all 0.2s"}}>
          ◈ MAINS TESTS
        </button>
        <button onClick={()=>setSection("adv")}
          style={{padding:"8px 16px",border:`1px solid ${section==="adv"?"#ec4899":"#1e293b"}`,background:section==="adv"?"#ec489918":"transparent",color:section==="adv"?"#ec4899":"#475569",fontSize:"11px",letterSpacing:"2px",fontWeight:section==="adv"?700:400,transition:"all 0.2s"}}>
          ◈ ADVANCED TESTS
        </button>
      </div>

      {/* ── MAINS section ── */}
      {section==="mains"&&(
        <>
          {mainsDone.length>0&&(
            <Card style={{marginBottom:"16px"}}>
              <Lbl>MAINS SCORE TREND (target: 200+)</Lbl>

/* ═══════════════════════════════════════════════════════
   TOPICS TAB

function TopicsTab({advUnlocked}){
  const [section,setSection]=useState("log");
  const [topics,setTopics]=useState(()=>ld("jee_topics",{}));
  const [selDate,setSelDate]=useState(todayStr());
  const [draft,setDraft]=useState({Physics:"",Maths:"",Chemistry:""});
  const [saved,setSaved]=useState(false);
  const [branchStatus,setBranchStatus]=useState(()=>ld("adv_topics",{}));
  const [activeSubj,setActiveSubj]=useState("Physics");

  const SUBJ=[{name:"Physics",color:"#60a5fa",icon:"⚡"},{name:"Maths",color:"#a78bfa",icon:"∑"},{name:"Chemistry",color:"#34d399",icon:"⚗"}];
  const sColors={Physics:"#60a5fa",Chemistry:"#34d399",Maths:"#a78bfa"};

  useEffect(()=>{
    const ex=topics[selDate]||{};
    setDraft({Physics:ex.Physics||"",Maths:ex.Maths||"",Chemistry:ex.Chemistry||""});
    setSaved(false);
  },[selDate]);

  function saveDraft(){
    if(!draft.Physics&&!draft.Maths&&!draft.Chemistry)return;
    const n={...topics,[selDate]:draft};setTopics(n);sv("jee_topics",n);setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  }
  function cycleBranch(key){const cur=branchStatus[key]||0;const n={...branchStatus,[key]:(cur+1)%3};setBranchStatus(n);sv("adv_topics",n);}

  const entries=Object.keys(topics).sort((a,b)=>b.localeCompare(a));
  const statusCfg=[{label:"UNTOUCHED",bg:"#0d1117",border:"#1e293b",text:"#334155"},{label:"REVISING",bg:"#451a0308",border:"#f59e0b55",text:"#f59e0b"},{label:"DONE ✓",bg:"#0d2a1a",border:"#34d39955",text:"#34d399"}];

  return(
    <div className="fadeup">
      <div style={{display:"flex",gap:"8px",marginBottom:"18px"}}>
        <button onClick={()=>setSection("log")} style={{padding:"7px 14px",border:`1px solid ${section==="log"?"#a78bfa":"#1e293b"}`,background:section==="log"?"#a78bfa18":"transparent",color:section==="log"?"#a78bfa":"#475569",fontSize:"10px",letterSpacing:"2px",fontWeight:section==="log"?700:400}}>◈ DAILY LOG</button>
        {advUnlocked&&<button onClick={()=>setSection("branches")} style={{padding:"7px 14px",border:`1px solid ${section==="branches"?"#ec4899":"#1e293b"}`,background:section==="branches"?"#ec489918":"transparent",color:section==="branches"?"#ec4899":"#475569",fontSize:"10px",letterSpacing:"2px",fontWeight:section==="branches"?700:400}}>◈ SUB-BRANCHES (ADV)</button>}
      </div>

      {section==="log"&&(
        <div className="twocol" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"20px"}}>
          <div>
            <Lbl>LOG TOPICS STUDIED</Lbl>
            <Card style={{marginBottom:"12px"}}>
              <div style={{fontSize:"10px",color:"#f59e0b",fontWeight:700,letterSpacing:"2px",marginBottom:"8px"}}>
                📅 {new Date(selDate+"T00:00:00").toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long"})}
              </div>
              <input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)}
                style={{width:"100%",background:"#0a0a0f",border:"1px solid #1e293b",color:"#64748b",padding:"7px 10px",fontSize:"11px",outline:"none"}}/>
            </Card>
            {SUBJ.map(s=>(
              <div key={s.name} style={{marginBottom:"12px"}}>
                <div style={{fontSize:"10px",color:s.color,fontWeight:700,letterSpacing:"2px",marginBottom:"5px"}}>{s.icon} {s.name.toUpperCase()}</div>
                <textarea value={draft[s.name]} onChange={e=>setDraft({...draft,[s.name]:e.target.value})}
                  placeholder={`e.g. Electrostatics — Coulomb's law, Gauss theorem...`} rows={3}
                  style={{width:"100%",background:"#0d1117",resize:"vertical",border:`1px solid ${draft[s.name]?s.color:"#1e293b"}`,color:"#e2e8f0",padding:"10px",fontSize:"11px",outline:"none",lineHeight:1.5,transition:"border-color 0.2s"}}/>
              </div>
            ))}
            <button onClick={saveDraft}
              onMouseOver={e=>e.currentTarget.style.background="#f59e0b22"} onMouseOut={e=>e.currentTarget.style.background="transparent"}
              style={{width:"100%",padding:"10px",background:"transparent",border:`1px solid ${saved?"#34d399":"#f59e0b"}`,color:saved?"#34d399":"#f59e0b",fontSize:"11px",letterSpacing:"2px",fontWeight:700,transition:"all 0.2s"}}>
              {saved?"✓ SAVED!":"◈ SAVE TOPICS"}
            </button>
          </div>
          <div>
            <Lbl>HISTORY</Lbl>
            {entries.length===0?<Card><div style={{textAlign:"center",color:"#334155",fontSize:"12px",padding:"20px 0"}}>No topics logged yet.</div></Card>
            :entries.slice(0,15).map(d=>{
              const e=topics[d]; if(!e||(!e.Physics&&!e.Maths&&!e.Chemistry))return null;
              return(
                <Card key={d} style={{marginBottom:"10px"}}>
                  <div style={{fontSize:"10px",color:"#f59e0b",fontWeight:700,letterSpacing:"2px",marginBottom:"8px"}}>
                    {new Date(d+"T00:00:00").toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"})}
                  </div>
                  {SUBJ.map(s=>e[s.name]&&(
                    <div key={s.name} style={{marginBottom:"6px"}}>
                      <div style={{fontSize:"9px",color:s.color,letterSpacing:"2px",marginBottom:"2px"}}>{s.icon} {s.name.toUpperCase()}</div>
                      <div style={{fontSize:"11px",color:"#94a3b8",lineHeight:1.5}}>{e[s.name]}</div>
                    </div>
                  ))}
                </Card>
              );
            })}
          </div>
        </div>
      )}

      {section==="branches"&&advUnlocked&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginBottom:"16px"}}>
            {["Physics","Chemistry","Maths"].map(s=>{
              const br=SUBBRANCHES[s];const c=sColors[s];
              const done=br.filter(b=>branchStatus[`${s}_${b}`]===2).length;
              const wip=br.filter(b=>branchStatus[`${s}_${b}`]===1).length;
              return(
                <button key={s} onClick={()=>setActiveSubj(s)}
                  style={{padding:"12px",background:activeSubj===s?`${c}15`:"#0d1117",border:`1px solid ${activeSubj===s?c:"#1e293b"}`,textAlign:"left",transition:"all 0.2s"}}>
                  <div style={{fontSize:"10px",color:c,fontWeight:700,marginBottom:"5px"}}>{s}</div>
                  <div style={{fontSize:"18px",fontWeight:900,color:c,marginBottom:"4px"}}>{done}/{br.length}</div>
                  <div style={{height:"3px",background:"#1e293b",marginBottom:"4px"}}><div style={{height:"100%",width:`${(done/br.length)*100}%`,background:c}}/></div>
                  <div style={{fontSize:"9px",color:"#475569"}}>{wip} revising</div>
                </button>
              );
            })}
          </div>
          <div style={{display:"flex",gap:"10px",marginBottom:"12px",flexWrap:"wrap"}}>
            {statusCfg.map((s,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:"6px",fontSize:"9px",color:s.text}}>
                <div style={{width:"10px",height:"10px",background:s.bg,border:`1px solid ${s.border}`}}/>
                {s.label}
              </div>
            ))}
            <span style={{fontSize:"9px",color:"#334155"}}>— click to cycle</span>
          </div>
          <Card>
            <Lbl style={{color:sColors[activeSubj]}}>{activeSubj.toUpperCase()} — {SUBBRANCHES[activeSubj].length} TOPICS</Lbl>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(175px,1fr))",gap:"6px"}}>
              {SUBBRANCHES[activeSubj].map(b=>{
                const key=`${activeSubj}_${b}`;const st=branchStatus[key]||0;const cfg=statusCfg[st];
                return(
                  <button key={b} onClick={()=>cycleBranch(key)}
                    style={{padding:"9px 12px",background:cfg.bg,border:`1px solid ${cfg.border}`,color:cfg.text,fontSize:"10px",textAlign:"left",transition:"all 0.15s",lineHeight:1.4}}>
                    <div style={{fontWeight:st===2?700:400}}>{b}</div>
                    <div style={{fontSize:"8px",opacity:0.7,marginTop:"2px",letterSpacing:"1px"}}>{cfg.label}</div>
                  </button>
                );
              })}
            </div>
          </Card>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   PROGRESS TAB
═══════════════════════════════════════════════════════ */
function ProgressTab({advUnlocked}){
  const doneDays=ld("jee_done",{});
  const scores=ld("jee_scores",{});
  const advScores=ld("adv_scores",{});
  const MSUBJ=["Physics","Maths","Chemistry"];
  const ASUBJ=["Physics","Chemistry","Maths"];

  function mainsTotal(id){const v=MSUBJ.map(s=>scores[`${id}_${s}`]).filter(v=>v!==null&&v!==undefined);return v.length?v.reduce((a,b)=>a+b,0):null;}
  function advTotal(id){const v=ASUBJ.map(s=>advScores[`${id}_${s}`]).filter(v=>v!==null&&v!==undefined);return v.length===3?v.reduce((a,b)=>a+b,0):null;}

  // Overall score 0-100
  function calcScore(){
    let pts=0,total=0;
    for(const p of PHASES){
      for(let d=1;d<=p.days;d++){total+=2;if(doneDays[`p${p.id}_d${d}`])pts+=2;}
    }
    for(const t of MAINS_TESTS){const v=mainsTotal(t.id);if(v!==null){total+=2;pts+=Math.min(2,(v/300)*2);}}
    for(const t of ADV_TESTS){const v=advTotal(t.id);if(v!==null){total+=3;pts+=Math.min(3,(v/306)*3);}}
    if(!total)return 0;
    return Math.min(100,Math.round((pts/total)*100));
  }
  const overall=calcScore();
  function level(s){
    if(s>=80)return{name:"ELITE",       color:"#f59e0b"};
    if(s>=60)return{name:"ADVANCED",    color:"#34d399"};
    if(s>=40)return{name:"PROGRESSING", color:"#60a5fa"};
    if(s>=20)return{name:"BUILDING",    color:"#a78bfa"};
    return          {name:"STARTING",   color:"#475569"};
  }
  const lv=level(overall);

  const mainsDone=MAINS_TESTS.filter(t=>mainsTotal(t.id)!==null);
  const advDone  =ADV_TESTS.filter(t=>advTotal(t.id)!==null);
  const mTotals  =mainsDone.map(t=>mainsTotal(t.id));
  const aTotals  =advDone.map(t=>advTotal(t.id));
  const mBest    =mTotals.length?Math.max(...mTotals):null;
  const aBest    =aTotals.length?Math.max(...aTotals):null;

  function phaseProgress(pid){const done=Object.keys(doneDays).filter(k=>k.startsWith(`p${pid}`)).length;return Math.round((done/PHASES[pid-1].days)*100);}

  // activity grid
  const activity=Array.from({length:72}).map((_,i)=>{
    let phase,day,color;
    if(i<10){phase=1;day=i+1;color="#f59e0b";}
    else if(i<32){phase=2;day=i-9;color="#3b82f6";}
    else{phase=3;day=i-31;color="#ec4899";}
    const done=doneDays[`p${phase}_d${day}`];
    return{phase,day,done,color};
  });

  return(
    <div className="fadeup">
      <Card style={{textAlign:"center",padding:"32px 20px",marginBottom:"20px",borderColor:`${lv.color}44`,background:`${lv.color}06`}}>
        <div style={{fontSize:"9px",letterSpacing:"4px",color:"#475569",marginBottom:"8px"}}>KARTIKEY'S OVERALL SCORE</div>
        <div style={{fontSize:"76px",fontWeight:900,color:lv.color,lineHeight:1}}>{overall}</div>
        <div style={{fontSize:"10px",letterSpacing:"5px",color:lv.color,marginBottom:"16px"}}>{lv.name}</div>
        <div style={{height:"8px",background:"#1e293b",overflow:"hidden",maxWidth:"300px",margin:"0 auto"}}>
          <div style={{height:"100%",width:`${overall}%`,background:`linear-gradient(90deg,${lv.color},#fcd34d)`,transition:"width 1s ease"}}/>
        </div>
        <div style={{fontSize:"10px",color:"#334155",marginTop:"8px"}}>starts at 0 — rises with every day done + test score</div>
      </Card>

      <div className="sgrid" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"10px",marginBottom:"20px"}}>
        {[
          {l:"MAINS BEST",  v:mBest?`${mBest}/300`:"—",  c:"#3b82f6"},
          {l:"ADV BEST",    v:aBest?`${aBest}/306`:"—",  c:"#ec4899"},
          {l:"DAYS DONE",   v:Object.keys(doneDays).filter(k=>doneDays[k]).length,c:"#34d399"},
          {l:"LEVEL",       v:lv.name.slice(0,4),         c:lv.color},
        ].map(s=>(
          <Card key={s.l}><div style={{fontSize:"9px",letterSpacing:"2px",color:"#475569",marginBottom:"4px"}}>{s.l}</div><div style={{fontSize:"18px",fontWeight:900,color:s.c}}>{s.v}</div></Card>
        ))}
      </div>

      <div className="twocol" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"20px"}}>
        <div>
          {/* Phase progress */}
          <Card style={{marginBottom:"14px"}}>
            <Lbl>PHASE COMPLETION</Lbl>
            {PHASES.map(p=>{
              const pct=phaseProgress(p.id);const done=Object.keys(doneDays).filter(k=>k.startsWith(`p${p.id}`)).length;
              return(
                <div key={p.id} style={{marginBottom:"12px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:"5px"}}>
                    <div style={{fontSize:"11px",fontWeight:700,color:p.color}}>PHASE {p.id} {p.isAdvanced?"(ADV)":""}</div>
                    <div style={{fontSize:"13px",fontWeight:900,color:p.color}}>{pct}%</div>
                  </div>
                  <div style={{height:"5px",background:"#1e293b"}}><div style={{height:"100%",width:`${pct}%`,background:p.color,transition:"width 0.5s"}}/></div>
                  <div style={{fontSize:"9px",color:"#475569",marginTop:"4px"}}>{done}/{p.days} days</div>
                </div>
              );
            })}
          </Card>

          {/* Mains subject targets */}
          <Card style={{marginBottom:"14px"}}>
            <Lbl>MAINS — SUBJECT VS TARGET</Lbl>
            {[{s:"Physics",t:80,max:100,c:"#60a5fa"},{s:"Chemistry",t:90,max:100,c:"#34d399"},{s:"Maths",t:60,max:100,c:"#a78bfa"}].map(({s,t,max,c})=>{
              const arr=MAINS_TESTS.map(x=>scores[`${x.id}_${s}`]).filter(v=>v!==null&&v!==undefined);
              const avg=arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):null;
              const hit=avg!==null&&avg>=t;
              return(
                <div key={s} style={{marginBottom:"13px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}}>
                    <div style={{display:"flex",gap:"6px",alignItems:"center"}}><span style={{fontSize:"10px",color:c,fontWeight:700}}>{s}</span><Tag color={c}>target {t}+</Tag></div>
                    <div style={{display:"flex",gap:"5px",alignItems:"center"}}>
                      <span style={{fontSize:"12px",fontWeight:900,color:avg!==null?(hit?"#34d399":"#f87171"):"#334155"}}>{avg!==null?`${avg}/${max}`:"—"}</span>
                      {avg!==null&&<Tag color={hit?"#34d399":"#f87171"}>{hit?"✓":`-${t-avg}`}</Tag>}
                    </div>
                  </div>
                  <div style={{position:"relative",height:"6px",background:"#1e293b"}}>
                    <div style={{height:"100%",width:`${avg?((avg/max)*100):0}%`,background:avg?(hit?c:"#f87171"):"#1e293b",transition:"width 0.5s"}}/>
                    <div style={{position:"absolute",top:"-4px",left:`${(t/max)*100}%`,width:"2px",height:"14px",background:c,opacity:0.8}}/>
                  </div>
                </div>
              );
            })}
            {mainsDone.length===0&&<div style={{fontSize:"10px",color:"#334155",textAlign:"center",paddingTop:"6px"}}>Enter mains test scores to see averages</div>}
          </Card>

          {/* Advanced subject targets */}
          {advUnlocked&&(
            <Card>
              <Lbl>ADVANCED — SUBJECT VS TARGET</Lbl>
              {[{s:"Physics",t:96,max:102,c:"#60a5fa"},{s:"Chemistry",t:102,max:102,c:"#34d399"},{s:"Maths",t:84,max:102,c:"#a78bfa"}].map(({s,t,max,c})=>{
                const arr=ADV_TESTS.map(x=>advScores[`${x.id}_${s}`]).filter(v=>v!==null&&v!==undefined);
                const avg=arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):null;
                const hit=avg!==null&&avg>=t;
                return(
                  <div key={s} style={{marginBottom:"13px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}}>
                      <div style={{display:"flex",gap:"6px",alignItems:"center"}}><span style={{fontSize:"10px",color:c,fontWeight:700}}>{s}</span><Tag color={c}>target {t}+/{max}</Tag></div>
                      <div style={{display:"flex",gap:"5px",alignItems:"center"}}>
                        <span style={{fontSize:"12px",fontWeight:900,color:avg!==null?(hit?"#34d399":"#f87171"):"#334155"}}>{avg!==null?`${avg}/${max}`:"—"}</span>
                        {avg!==null&&<Tag color={hit?"#34d399":"#f87171"}>{hit?"✓":`-${t-avg}`}</Tag>}
                      </div>
                    </div>
                    <div style={{position:"relative",height:"6px",background:"#1e293b"}}>
                      <div style={{height:"100%",width:`${avg?((avg/max)*100):0}%`,background:avg?(hit?c:"#f87171"):"#1e293b",transition:"width 0.5s"}}/>
                      <div style={{position:"absolute",top:"-4px",left:`${(t/max)*100}%`,width:"2px",height:"14px",background:c,opacity:0.8}}/>
                    </div>
                  </div>
                );
              })}
              {advDone.length===0&&<div style={{fontSize:"10px",color:"#334155",textAlign:"center",paddingTop:"6px"}}>Enter advanced test scores to see averages</div>}
            </Card>
          )}
        </div>

        <div>
          {/* 72-day activity */}
          <Card style={{marginBottom:"14px"}}>
            <Lbl>72-DAY ACTIVITY (ALL PHASES)</Lbl>
            <div style={{display:"grid",gridTemplateColumns:"repeat(12,1fr)",gap:"3px",marginBottom:"8px"}}>
              {activity.map((a,i)=>(
                <div key={i} style={{aspectRatio:"1",background:a.done?"#0d2a1a":"#0d1117",border:`1px solid ${a.done?"#34d399":a.color+"22"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"6px",color:a.done?"#34d399":a.color+"55"}}>
                  {a.done?"✓":a.day}
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:"12px",flexWrap:"wrap",fontSize:"9px"}}>
              {PHASES.map(p=><span key={p.id} style={{color:p.color}}>■ P{p.id}</span>)}
              <span style={{color:"#34d399"}}>✓ done</span>
            </div>
          </Card>

          {/* Motivation */}
          <Card style={{borderColor:"#f59e0b44",background:"#f59e0b06"}}>
            <div style={{fontSize:"9px",color:"#f59e0b",letterSpacing:"3px",marginBottom:"10px"}}>◈ KARTIKEY'S MISSION</div>
            <div style={{lineHeight:1.7}}>
              <div style={{fontSize:"12px",fontWeight:700,color:"#e2e8f0",marginBottom:"8px"}}>JEE Mains → JEE Advanced</div>
              <div style={{fontSize:"11px",color:"#64748b",marginBottom:"4px"}}>Mains: <span style={{color:"#60a5fa"}}>Phy 80+</span> · <span style={{color:"#34d399"}}>Chem 90+</span> · <span style={{color:"#a78bfa"}}>Math 60+</span></div>
              <div style={{fontSize:"11px",color:"#64748b",marginBottom:"12px"}}>Advanced: <span style={{color:"#60a5fa"}}>Phy 96+</span> · <span style={{color:"#34d399"}}>Chem 102+</span> · <span style={{color:"#a78bfa"}}>Math 84+</span> = <span style={{color:"#f59e0b"}}>280+/306</span></div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",paddingTop:"10px",borderTop:"1px solid #1e293b"}}>
              <div><div style={{fontSize:"9px",color:"#475569",marginBottom:"2px"}}>OVERALL SCORE</div><div style={{fontSize:"22px",fontWeight:900,color:lv.color}}>{overall}/100</div></div>
              <div style={{textAlign:"right"}}><div style={{fontSize:"9px",color:"#475569",marginBottom:"2px"}}>LEVEL</div><div style={{fontSize:"14px",fontWeight:900,color:lv.color}}>{lv.name}</div></div>
            </div>
          </Card>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   MAINS DATE BAR  (always visible in header)
═══════════════════════════════════════════════════════ */
function MainsDateBar({mainsDate,onSetMainsDate}){
  const [editing,setEditing]=useState(false);
  const [val,setVal]=useState(mainsDate||"");

  const today=new Date(); today.setHours(0,0,0,0);
  const examDate=mainsDate?new Date(mainsDate):null;
  if(examDate)examDate.setHours(0,0,0,0);
  const daysLeft=examDate&&today<=examDate?Math.ceil((examDate-today)/86400000):null;
  const mainsDone=examDate&&today>examDate;

  function save(){if(val){onSetMainsDate(val);setEditing(false);}}

  return(
    <div style={{marginBottom:"16px",padding:"10px 14px",background:"#0d1117",border:"1px solid #1e293b",display:"flex",alignItems:"center",gap:"12px",flexWrap:"wrap"}}>
      <div style={{fontSize:"9px",letterSpacing:"3px",color:"#475569",minWidth:"max-content"}}>JEE MAINS DATE</div>

      {!editing?(
        <>
          <div style={{flex:1,fontSize:"12px",fontWeight:700,color:mainsDone?"#34d399":examDate?"#f59e0b":"#334155"}}>
            {examDate
              ? examDate.toLocaleDateString("en-IN",{day:"numeric",month:"long",year:"numeric"})
              : "Not set yet — tap to set"}
          </div>
          {daysLeft!==null&&(
            <div style={{fontSize:"9px",color:"#f59e0b",background:"#f59e0b15",border:"1px solid #f59e0b33",padding:"3px 8px",whiteSpace:"nowrap"}}>
              {daysLeft} day{daysLeft!==1?"s":""} left
            </div>
          )}
          {mainsDone&&<Tag color="#34d399">✓ MAINS DONE</Tag>}
          <button onClick={()=>{setVal(mainsDate||"");setEditing(true);}}
            style={{padding:"4px 10px",background:"transparent",border:"1px solid #f59e0b",color:"#f59e0b",fontSize:"9px",letterSpacing:"2px",whiteSpace:"nowrap"}}>
            {examDate?"CHANGE":"SET DATE"}
          </button>
        </>
      ):(
        <>
          <div style={{fontSize:"10px",color:"#475569"}}>Pick your exam date (Apr 3 / 4 / 5):</div>
          <input type="date" value={val} onChange={e=>setVal(e.target.value)}
            min="2026-04-01" max="2026-04-10"
            style={{background:"#0a0a0f",border:"1px solid #f59e0b",color:"#f59e0b",padding:"5px 8px",fontSize:"11px",outline:"none"}}/>
          <button onClick={save}
            style={{padding:"5px 12px",background:"transparent",border:"1px solid #34d399",color:"#34d399",fontSize:"10px",letterSpacing:"2px",fontWeight:700}}>
            ✓ SAVE
          </button>
          <button onClick={()=>setEditing(false)}
            style={{padding:"5px 10px",background:"transparent",border:"1px solid #1e293b",color:"#475569",fontSize:"10px"}}>
            ✕
          </button>
        </>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════ */
function App(){
  const [unlocked,setUnlocked]=useState(()=>ld("jee_auth",false));
  const [advUnlocked,setAdvUnlocked]=useState(()=>ld("adv_auth",false));
  const [mainsDate,setMainsDate]=useState(()=>ld("jee_mains_date",null));
  const [tab,setTab]=useState("guide");

  function handleSetMainsDate(d){setMainsDate(d);sv("jee_mains_date",d);}

  const TABS=[
    {id:"guide",   label:"◈ GUIDE",    c:"#f59e0b"},
    {id:"planner", label:"◈ PLANNER",  c:"#f59e0b"},
    {id:"tests",   label:"◈ TESTS",    c:"#3b82f6"},
    {id:"topics",  label:"◈ TOPICS",   c:"#a78bfa"},
    {id:"progress",label:"◈ PROGRESS", c:"#34d399"},
  ];
  const topC=TABS.find(t=>t.id===tab)?.c||"#f59e0b";

  useEffect(()=>{
    const b=document.getElementById("topBar");
    if(b)b.style.background=`linear-gradient(90deg,${topC},#fcd34d,${topC})`;
  },[tab]);

  function handleUnlock(){setUnlocked(true);sv("jee_auth",true);}
  function handleAdvUnlock(){setAdvUnlocked(true);sv("adv_auth",true);}
  function handleLock(){setUnlocked(false);sv("jee_auth",false);}

  if(!unlocked)return React.createElement(PasswordScreen,{onUnlock:handleUnlock});

  return(
    <div className="wrap">
      <div style={{marginBottom:"22px"}}>
        <div style={{fontSize:"9px",letterSpacing:"4px",color:topC,marginBottom:"4px",fontWeight:700}}>◈ JEE MAINS + ADVANCED 2026</div>
        <h1 style={{fontSize:"clamp(20px,4vw,32px)",fontWeight:900,letterSpacing:"-1px",lineHeight:1.1}}>
          KARTIKEY <span style={{color:topC}}>BHARDWAJ</span>
        </h1>
        <div style={{fontSize:"10px",color:"#334155",marginTop:"5px",letterSpacing:"3px"}}>
          MAR 2 → MAY 12 · 72 DAYS · 3 PHASES
        </div>
      </div>

      {/* Mains date bar */}
      <MainsDateBar mainsDate={mainsDate} onSetMainsDate={handleSetMainsDate}/>

      <div style={{display:"flex",gap:"6px",marginBottom:"24px",flexWrap:"wrap",alignItems:"center"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{padding:"7px 13px",border:`1px solid ${tab===t.id?t.c:"#1e293b"}`,
              background:tab===t.id?`${t.c}15`:"transparent",color:tab===t.id?t.c:"#475569",
              fontSize:"10px",letterSpacing:"2px",fontWeight:tab===t.id?700:400,transition:"all 0.2s"}}>
            {t.label}
          </button>
        ))}
        <button onClick={handleLock} style={{marginLeft:"auto",padding:"7px 12px",border:"1px solid #1e293b",background:"transparent",color:"#334155",fontSize:"9px",letterSpacing:"2px"}}>LOCK</button>
      </div>

      {tab==="guide"    && React.createElement(GuideTab)}
      {tab==="planner"  && React.createElement(PlannerTab,{advUnlocked,onAdvUnlock:handleAdvUnlock,mainsDate,onSetMainsDate:handleSetMainsDate})}
      {tab==="tests"    && React.createElement(TestsTab,{advUnlocked})}
      {tab==="topics"   && React.createElement(TopicsTab,{advUnlocked})}
      {tab==="progress" && React.createElement(ProgressTab,{advUnlocked})}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
