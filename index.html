<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>JEE Ultimate Tracker 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg0:#020206;--bg1:#06060f;--bg2:#0b0b18;--bg3:#111122;--bg4:#181830;--bg5:#1f1f3a;
  --b1:#1a1a30;--b2:#252545;
  --gold:#c9a84c;--gold2:#e8c96a;--gold3:#f5dfa0;--gdim:#7a6428;
  --re:#ff4757;--re2:#ff6b81;--gr:#2ed573;--gr2:#7bed9f;
  --bl:#1e90ff;--bl2:#70a1ff;--or:#ffa502;--pu:#a29bfe;--cy:#00cec9;--pi:#fd79a8;
  --ph:#4fc3f7;--ch:#81c784;--ma:#ffb74d;
  --t1:#f0ebe0;--t2:#c8c4b8;--t3:#7575a0;--t4:#3a3a5c;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Crimson Pro',Georgia,serif;background:var(--bg0);color:var(--t1);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg1);}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{text-shadow:0 0 20px rgba(201,168,76,.4)}50%{text-shadow:0 0 50px rgba(201,168,76,.9),0 0 100px rgba(201,168,76,.3)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes borderGlow{0%,100%{box-shadow:0 0 0 rgba(201,168,76,0)}50%{box-shadow:0 0 30px rgba(201,168,76,.15)}}
@keyframes tickFlip{0%{transform:rotateX(0)}50%{transform:rotateX(90deg);opacity:.3}100%{transform:rotateX(0)}}
.flip{animation:tickFlip .15s ease}

/* LAYOUT */
.app{display:flex;min-height:100vh;}
.sb{width:220px;flex-shrink:0;background:var(--bg1);border-right:1px solid var(--b1);display:flex;flex-direction:column;padding:0;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:100;}
.main{flex:1;overflow-x:hidden;min-width:0;}

/* SIDEBAR */
.logo{padding:18px 16px;border-bottom:1px solid var(--b1);}
.logo-t{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--gold);animation:glow 3s ease-in-out infinite;line-height:1;}
.logo-s{font-size:10px;color:var(--t4);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
.nl{font-size:9px;color:var(--t4);letter-spacing:3px;text-transform:uppercase;padding:14px 16px 5px;}
.ni{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;transition:all .2s;color:var(--t3);font-size:14px;font-weight:600;border-left:2px solid transparent;}
.ni:hover{background:rgba(255,255,255,.03);color:var(--t1);}
.ni.ac{background:rgba(201,168,76,.07);border-left-color:var(--gold);color:var(--gold);}
.ni-ico{font-size:16px;width:18px;text-align:center;flex-shrink:0;}
.ni-badge{margin-left:auto;font-size:9px;padding:1px 6px;border-radius:99px;font-family:'JetBrains Mono',monospace;font-weight:700;flex-shrink:0;}
.sb-foot{margin-top:auto;padding:12px 16px;border-top:1px solid var(--b1);}
.exam-mini{font-family:'JetBrains Mono',monospace;font-size:10px;text-align:center;padding:8px;border-radius:8px;margin-bottom:6px;}

/* TOPBAR */
.topbar{position:sticky;top:0;background:rgba(2,2,6,.93);backdrop-filter:blur(20px);border-bottom:1px solid var(--b1);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;z-index:50;gap:12px;}
.pg-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--t1);flex-shrink:0;}
.content{max-width:1440px;margin:0 auto;padding:20px 24px 80px;}
.tab-pane{display:none;animation:fadeUp .3s ease;}
.tab-pane.ac{display:block;}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--b1);border-radius:16px;padding:20px;}
.card-g{background:linear-gradient(135deg,rgba(201,168,76,.07),rgba(30,144,255,.03));border:1px solid rgba(201,168,76,.2);border-radius:16px;padding:20px;}
.card-re{background:rgba(255,71,87,.05);border:1px solid rgba(255,71,87,.2);border-radius:16px;padding:20px;}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.mb12{margin-bottom:12px;}.mb16{margin-bottom:16px;}.mb20{margin-bottom:20px;}

/* COUNTDOWN HERO */
.cd-hero{position:relative;overflow:hidden;border-radius:20px;padding:28px;margin-bottom:16px;}
.cd-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--re),var(--gold),var(--bl),transparent);background-size:200% auto;animation:shimmer 3s linear infinite;}
.cd-twin{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.cd-box{background:rgba(0,0,0,.3);border:1px solid;border-radius:14px;padding:16px;}
.cd-box-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;font-weight:700;margin-bottom:12px;text-align:center;}
.cd-digits{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.cd-unit{background:var(--bg3);border:1px solid var(--b2);border-radius:10px;padding:12px 6px;text-align:center;perspective:200px;}
.cd-num{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:800;line-height:1;background:linear-gradient(180deg,var(--gold3),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;}
.cd-lbl{font-size:9px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-top:4px;}
.cd-ms-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px;font-family:'JetBrains Mono',monospace;}
.cd-ms-num{font-size:20px;font-weight:800;color:var(--gold2);}
.cd-ms-lbl{font-size:9px;color:var(--t4);}
.cd-bar{height:5px;background:rgba(255,255,255,.05);border-radius:99px;overflow:hidden;margin-top:10px;}
.cd-bar-fill{height:100%;border-radius:99px;transition:width .1s linear;}

/* STATS */
.stat-p{background:var(--bg3);border:1px solid var(--b1);border-radius:12px;padding:14px;text-align:center;transition:all .2s;}
.stat-p:hover{transform:translateY(-2px);border-color:rgba(201,168,76,.2);}
.stat-v{font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:800;line-height:1;}
.stat-l{font-size:11px;color:var(--t3);margin-top:4px;font-style:italic;}

/* DAY CARDS */
.day-card{background:var(--bg2);border:1px solid var(--b1);border-radius:14px;overflow:hidden;margin-bottom:8px;transition:border-color .2s;}
.day-card:hover{border-color:rgba(201,168,76,.15);}
.day-card.today-card{border-color:rgba(255,71,87,.4);box-shadow:0 0 24px rgba(255,71,87,.08);}
.dh{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;}
.day-num-badge{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:800;flex-shrink:0;}
.di{flex:1;min-width:0;}
.di-title{font-size:15px;font-weight:700;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.di-sub{font-size:12px;color:var(--t3);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.dr{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.d-pct{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;}
.d-chk{width:26px;height:26px;border-radius:7px;border:1.5px solid;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;font-size:12px;}
.db{padding:0 16px 14px;border-top:1px solid rgba(255,255,255,.04);}
.sub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:5px;margin-top:10px;}
.sub-item{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:8px;background:var(--bg3);border:1px solid var(--b1);cursor:pointer;transition:all .15s;font-size:12px;}
.sub-item:hover{border-color:rgba(201,168,76,.25);}
.sub-item.done{background:rgba(46,213,115,.06);border-color:rgba(46,213,115,.2);color:var(--gr);}
.sub-chk{width:14px;height:14px;border-radius:3px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:8px;opacity:.6;}
.sub-chk.done{background:var(--gr);border-color:var(--gr);color:var(--bg0);opacity:1;}
.imp-dot{width:5px;height:5px;border-radius:50%;background:var(--or);flex-shrink:0;margin-left:auto;}
.conf-strip{display:flex;gap:4px;margin-top:10px;align-items:center;}
.conf-dot{flex:1;height:5px;border-radius:99px;cursor:pointer;transition:all .15s;border:1px solid rgba(255,255,255,.08);}
.jee-note-box{background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.15);border-radius:8px;padding:9px 12px;margin-top:10px;font-size:12px;color:var(--gold3);font-style:italic;line-height:1.5;}

/* DUAL SUBJECT DAY */
.dual-day{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.dual-subj{border-radius:10px;padding:10px;border:1px solid;}

/* TEST TRACKER */
.test-card{background:var(--bg3);border:1px solid var(--b1);border-radius:14px;padding:16px;cursor:pointer;transition:all .2s;position:relative;}
.test-card:hover{border-color:rgba(201,168,76,.2);transform:translateY(-1px);}
.test-card.done-tc{border-color:rgba(46,213,115,.25);background:rgba(46,213,115,.03);}
.test-card.today-tc{border-color:rgba(255,71,87,.4);background:rgba(255,71,87,.04);}
.test-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t4);}
.test-name{font-size:15px;font-weight:700;color:var(--t1);margin-top:4px;}
.test-type{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;font-family:'JetBrains Mono',monospace;display:inline-block;margin-top:5px;}
.score-display{margin-top:12px;}
.score-bars{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px;}
.score-bar-item{text-align:center;}
.score-bar-track{height:60px;background:rgba(255,255,255,.04);border-radius:4px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;}
.score-bar-fill{border-radius:4px 4px 0 0;transition:height .5s ease;}
.score-num{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;margin-top:4px;}
.score-sub-lbl{font-size:10px;color:var(--t3);}

/* SCORE ENTRY MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--b2);border-radius:20px;padding:28px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;animation:fadeUp .3s ease;}
.modal-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:20px;color:var(--gold);}
.inp-group{margin-bottom:14px;}
.inp-label{font-size:12px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;font-weight:700;margin-bottom:6px;display:block;}
.inp{width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:10px;padding:10px 14px;color:var(--t1);font-family:'JetBrains Mono',monospace;font-size:15px;outline:none;transition:border-color .2s;}
.inp:focus{border-color:rgba(201,168,76,.4);}
.inp-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.btn{cursor:pointer;border:none;outline:none;font-family:'Crimson Pro',serif;transition:all .2s;border-radius:10px;}
.btn-gold{background:linear-gradient(135deg,#7a5010,#c9a84c,#e8c96a);color:#1a0f00;font-weight:800;}
.btn-gold:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-ghost{background:rgba(255,255,255,.05);border:1px solid var(--b2);color:var(--t3);}
.btn-ghost:hover{background:rgba(255,255,255,.08);color:var(--t1);}
.btn-sm{font-size:13px;padding:6px 14px;}
.btn-md{font-size:15px;padding:10px 20px;}

/* ANALYSIS CHARTS */
.bar-chart{display:flex;flex-direction:column;gap:5px;}
.bc-row{display:flex;align-items:center;gap:8px;}
.bc-lbl{font-size:11px;color:var(--t2);width:160px;flex-shrink:0;text-align:right;}
.bc-track{flex:1;height:20px;background:rgba(255,255,255,.04);border-radius:5px;overflow:hidden;}
.bc-fill{height:100%;border-radius:5px;display:flex;align-items:center;padding-left:8px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;transition:width .8s ease;white-space:nowrap;}
.bc-val{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3);width:28px;text-align:right;}

/* PROGRESS CHART (line) */
.prog-chart{width:100%;height:180px;position:relative;overflow:hidden;}
.prog-svg{width:100%;height:100%;}


<!-- ══ STUDY PLAN ══ -->
<div class="tab-pane" id="tab-plan">
  <div class="card-g mb16">
    <div class="section-t">📅 23-Day Mains Sprint Plan</div>
    <div class="section-s">Mar 10–20: Physics 8hr + Maths 8hr (Days 1–9) → Days 10–11 add Physical Chemistry → Mar 21–Apr 1: Chemistry 12hr + Physics 2hr + Maths 2hr</div>
    <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap">
      <div style="background:rgba(79,195,247,.08);border:1px solid rgba(79,195,247,.25);border-radius:8px;padding:6px 14px;font-size:12px;color:var(--ph);font-weight:700">⚛️ Phase 1 Days 1–9: 8hr Physics + 8hr Maths</div>
      <div style="background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.25);border-radius:8px;padding:6px 14px;font-size:12px;color:var(--re2);font-weight:700">⚗️ Days 10–11: + Physical Chemistry Intro</div>
      <div style="background:rgba(129,199,132,.08);border:1px solid rgba(129,199,132,.25);border-radius:8px;padding:6px 14px;font-size:12px;color:var(--ch);font-weight:700">🧪 Phase 2 Days 12–23: 12hr Chem + 2hr Phy + 2hr Maths</div>
    </div>
    <div class="pill-tabs" id="plan-phase-tabs">
      <div class="pill-tab ac" onclick="switchPlanPhase('week1',this)">Phase 1A — Mar 10–14 (Days 1–5)</div>
      <div class="pill-tab" onclick="switchPlanPhase('week2',this)">Phase 1B — Mar 15–20 (Days 6–11)</div>
      <div class="pill-tab" onclick="switchPlanPhase('week3',this)">Phase 2A — Mar 21–27 (Days 12–18)</div>
      <div class="pill-tab" onclick="switchPlanPhase('week4',this)">Phase 2B — Mar 28–Apr 2 (Days 19–24)</div>
    </div>
  </div>
  <div id="plan-week-content"></div>
</div>

<!-- ══ PHYSICS ══ -->
<div class="tab-pane" id="tab-physics">
  <div class="card-g mb16" style="border-color:rgba(79,195,247,.25)">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
      <div style="font-size:48px;filter:drop-shadow(0 0 20px rgba(79,195,247,.5))">⚛️</div>
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:26px;font-weight:900;color:var(--ph)">Physics — 15 Day Sequence</div>
        <div style="font-size:13px;color:var(--t3);margin-top:3px">Modern→Ray→Wave→EMW→Current→12th→11th | Independent chapters first</div>
      </div>
    </div>
    <div id="ph-stats" class="g4"></div>
  </div>
  <div id="ph-list"></div>
</div>

<!-- ══ MATHS ══ -->
<div class="tab-pane" id="tab-maths">
  <div class="card-g mb16" style="border-color:rgba(255,183,77,.25)">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
      <div style="font-size:48px;filter:drop-shadow(0 0 20px rgba(255,183,77,.5))">📐</div>
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:26px;font-weight:900;color:var(--ma)">Maths — 14 Day Sequence</div>
        <div style="font-size:13px;color:var(--t3);margin-top:3px">Independent first (3D,Vectors,Seq,Complex) → Conics → Calculus linkage</div>
      </div>
    </div>
    <div id="ma-stats" class="g4"></div>
  </div>
  <div id="ma-list"></div>
</div>

<!-- ══ CHEMISTRY ══ -->
<div class="tab-pane" id="tab-chemistry">
  <div class="card-g mb16" style="border-color:rgba(129,199,132,.25)">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
      <div style="font-size:48px;filter:drop-shadow(0 0 20px rgba(129,199,132,.5))">🧪</div>
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:26px;font-weight:900;color:var(--ch)">Chemistry — 25 Day Daily</div>
        <div style="font-size:13px;color:var(--t3);margin-top:3px">Daily compulsory · Independent chapters first (Coord, Ald/Ket, Eq) → Linked</div>
      </div>
    </div>
    <div id="ch-stats" class="g4"></div>
  </div>
  <div id="ch-list"></div>
</div>

<!-- ══ MAINS TESTS ══ -->
<div class="tab-pane" id="tab-tests-mains">
  <div class="card-g mb16">
    <div class="section-t">📝 JEE Mains Test Series</div>
    <div class="section-s">Click any test card to enter your scores. Track subject-wise performance and improvement.</div>
    <div id="mains-test-summary" class="g3 mb16"></div>
  </div>
  <div id="mains-progress-chart" class="card mb16">
    <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:14px">📈 Score Progress Chart</div>
    <div id="mains-chart-area"></div>
  </div>
  <div id="mains-tests-grid"></div>
</div>

<!-- ══ ADVANCED TESTS ══ -->
<div class="tab-pane" id="tab-tests-adv">
  <div class="card-g mb16" style="border-color:rgba(162,155,254,.25)">
    <div class="section-t">⚡ JEE Advanced Test Series</div>
    <div class="section-s">Post-Mains Advanced preparation tests. Click to enter scores.</div>
    <div id="adv-test-summary" class="g3 mb16"></div>
  </div>
  <div id="adv-progress-chart" class="card mb16">
    <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:14px">📈 Advanced Score Progress</div>
    <div id="adv-chart-area"></div>
  </div>
  <div id="adv-tests-grid"></div>
</div>

<!-- ══ ADVANCED PLAN ══ -->
<div class="tab-pane" id="tab-adv-plan">
  <div class="card-g mb16" style="border-color:rgba(162,155,254,.3)">
    <div class="section-t" style="color:var(--pu)">🎯 JEE Advanced Plan — Apr 7 → May 16 (40 Days)</div>
    <div class="section-s">Full syllabus · 40 days · 16hr/day · 2 subjects × 8hr each · [ 2hr Theory + 5hr Practice + 1hr Error Analysis ] · 6 Full Tests + 4 Grand Mocks</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">
      <span style="font-size:10px;font-weight:700;padding:3px 10px;border-radius:6px;background:rgba(79,195,247,.1);color:#4fc3f7;font-family:'JetBrains Mono',monospace">🧠 2hr — Advanced Theory</span>
      <span style="font-size:10px;font-weight:700;padding:3px 10px;border-radius:6px;background:rgba(255,165,2,.1);color:#ffa502;font-family:'JetBrains Mono',monospace">⚔️ 5hr — Hard Practice (50+ Qs)</span>
      <span style="font-size:10px;font-weight:700;padding:3px 10px;border-radius:6px;background:rgba(255,71,87,.1);color:#ff4757;font-family:'JetBrains Mono',monospace">🔍 1hr — Error Analysis</span>
      <span style="font-size:10px;font-weight:700;padding:3px 10px;border-radius:6px;background:rgba(255,165,2,.1);color:#ffa502;font-family:'JetBrains Mono',monospace">⏱ 16hr Total/Day</span>
    </div>
  </div>
  <div style="background:rgba(255,71,87,.06);border:1px solid rgba(255,71,87,.25);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12.5px;color:var(--re2);display:flex;align-items:center;gap:8px">🚫 <strong>Apr 2–6 = JEE Mains Exam + REST.</strong> No studying. Recover fully before Advanced prep begins Apr 7.</div>
  <div id="adv-plan-content"></div>
</div>

</div></div></div><!-- /content /main /app -->

<script>

const MAINS_TARGET=new Date('2026-04-02T09:00:00');
const ADV_TARGET=new Date('2026-05-17T09:00:00');
const START_D=new Date('2026-03-05T00:00:00');
const fmt=v=>String(v).padStart(2,'0');
let prevSec=-1;

function tick(){
 const now=new Date();
 const dm=MAINS_TARGET-now, da=ADV_TARGET-now;
 const upd=(diff,pid,hid,mid,sid,msid,barid,startRef)=>{
  if(diff<=0)return;
  const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),
        m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000),ms=diff%1000;
  const curS=s;
  document.getElementById(pid).textContent=fmt(d);
  document.getElementById(hid).textContent=fmt(h);
  document.getElementById(mid).textContent=fmt(m);
  if(prevSec!==curS){document.getElementById(sid).classList.add('flip');setTimeout(()=>document.getElementById(sid).classList.remove('flip'),150);}
  document.getElementById(sid).textContent=fmt(s);
  document.getElementById(msid).textContent=String(ms).padStart(3,'0');
  const total=MAINS_TARGET-startRef;
  document.getElementById(barid).style.width=Math.min(100,Math.round((1-(diff/total))*100))+'%';
  document.getElementById('nb-days').textContent=Math.floor(dm/86400000)+'d';
 };
 upd(dm,'m-d','m-h','m-min','m-s','m-ms','m-bar',START_D);
 upd(da,'a-d','a-h','a-min','a-s','a-ms','a-bar',START_D);
 prevSec=Math.floor((dm%60000)/1000);
 requestAnimationFrame(tick);
}
tick();

function getProg(key){
 const data=key==='ph'?PH:key==='ma'?MA:CH;
 const total=data.reduce((a,d)=>a+d.subs.length,0);
 const done=data.reduce((a,d)=>a+d.subs.filter((_,i)=>S.subs[`${key}-${d.day}-${i}`]).length,0);
 return{total,done,pct:total?Math.round(done/total*100):0};
}
function updateTopbar(){
 const all=['ph','ma','ch'].map(k=>getProg(k));
 const total=all.reduce((a,x)=>a+x.total,0);
 const done=all.reduce((a,x)=>a+x.done,0);
 const pct=total?Math.round(done/total*100):0;
 document.getElementById('tp-txt').textContent=`${done}/${total} done (${pct}%)`;
 document.getElementById('tp-bar').style.width=pct+'%';
}
