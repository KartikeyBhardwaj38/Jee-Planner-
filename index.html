const GEMINI_MODEL = "gemini-1.5-flash";

function parseGeminiError(d){
  if(!d.error) return null;
  const msg = (d.error.message||"").toLowerCase();
  const code = d.error.code||0;
  if(code===429||msg.includes("quota")||msg.includes("rate")||msg.includes("limit")||msg.includes("exceeded")){
    return "RATE_LIMIT";
  }
  if((code===400||code===401||code===403)&&(msg.includes("api key")||msg.includes("invalid")||msg.includes("apikey"))){
    return "BAD_KEY";
  }
  return "ERR:"+d.error.message;
}

async function callGemini(apiKey, messages, sys, maxTokens){
  sys = sys||"You are an expert JEE tutor.";
  maxTokens = maxTokens||1000;
  if(!apiKey||!apiKey.trim()) return "❌ NO_API_KEY";
  const key = apiKey.trim();
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${key}`;
  // Convert to Gemini format, deduplicate consecutive same roles
  const raw = messages.map(m=>({
    role: m.role==="assistant"?"model":"user",
    parts:[{text: typeof m.content==="string"?m.content:JSON.stringify(m.content)}]
  }));
  const contents=[];
  for(const m of raw){
    if(contents.length&&contents[contents.length-1].role===m.role){
      contents[contents.length-1].parts[0].text+="\n"+m.parts[0].text;
    } else { contents.push(m); }
  }
  if(contents.length&&contents[0].role==="model") contents.shift();
  if(!contents.length) contents.push({role:"user",parts:[{text:"Hello"}]});
  const body={systemInstruction:{parts:[{text:sys}]},contents,generationConfig:{maxOutputTokens:maxTokens,temperature:0.7}};
  try{
    const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const d=await r.json();
    const err=parseGeminiError(d);
    if(err) return "❌ "+err;
    const text=d.candidates?.[0]?.content?.parts?.map(p=>p.text||"").join("")||"";
    if(!text) return "❌ Empty response. Try again.";
    return text;
  }catch(e){return "❌ Network:"+e.message;}
}

async function callGeminiWithPDF(apiKey, b64, mimeType, prompt){
  if(!apiKey||!apiKey.trim()) return "❌ NO_API_KEY";
  const key=apiKey.trim();
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${key}`;
  const body={contents:[{parts:[{inline_data:{mime_type:mimeType,data:b64}},{text:prompt}]}]};
  try{
    const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const d=await r.json();
    const err=parseGeminiError(d);
    if(err) return "❌ "+err;
    return d.candidates?.[0]?.content?.parts?.map(p=>p.text||"").join("")||"No content extracted.";
  }catch(e){return "❌ "+e.message;}
}

  const isRateLimit=msg.includes("RATE_LIMIT");

  const isNoKey=msg.includes("NO_API_KEY");

    <div style={{background:"#fef3c7",border:"1.5px solid #fde68a",borderRadius:10,padding:14,fontSize:13,color:"#92400e"}}>
      <b>⏳ Rate Limit Hit</b> — Free tier: 15 requests/minute<br/>

  );

      <b>❌ Invalid API Key</b><br/>

    <div style={{background:"#fef2f2",border:"1.5px solid #fecaca",borderRadius:10,padding:14,fontSize:13,color:"#991b1b"}}>
      <b>❌ Error:</b> {msg}
    </div>
  );
}

function useTimer(total,onEnd){
  const[left,setLeft]=useState(total);
  const[running,setRunning]=useState(false);
  const ref=useRef();
  useEffect(()=>{if(running&&left>0){ref.current=setInterval(()=>setLeft(l=>{if(l<=1){clearInterval(ref.current);setRunning(false);onEnd?.();return 0;}return l-1;}),1000);}return()=>clearInterval(ref.current);},[running]);
  const fmt=s=>`${String(Math.floor(s/3600)).padStart(2,"0")}:${String(Math.floor((s%3600)/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  return{left,fmt:fmt(left),pct:left/total,start:()=>setRunning(true),pause:()=>setRunning(false)};
}

function QPalette({count,current,setCurrent,answers,marked,visited}){
  const getCol=i=>{if(marked?.has(i)&&answers[i]!=null)return"#7c3aed";if(marked?.has(i))return"#f59e0b";if(answers[i]!=null)return"#16a34a";if(visited?.has(i))return"#dc2626";return"#e2e8f0";};
  return(<div style={{display:"flex",flexWrap:"wrap",gap:4}}>
    {Array(count).fill(0).map((_,i)=>(
      <div key={i} onClick={()=>setCurrent(i)} style={{width:32,height:32,borderRadius:"50%",background:getCol(i),color:getCol(i)==="#e2e8f0"?"#64748b":"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,cursor:"pointer",border:current===i?"3px solid #1e293b":"3px solid transparent"}}>
        {i+1}
      </div>
    ))}
  </div>);
}

    </div>

          ["Difficulty",<select value={diff} onChange={e=>setDiff(e.target.value)} style={inp}>{["Easy","Medium","Hard","Very Hard"].map(d=><option key={d}>{d}</option>)}</select>],
          ["Concept",<select value={concept} onChange={e=>setConcept(e.target.value)} style={inp}><option value="single">Single Concept</option><option value="dual">Dual Concept</option><option value="multi">Multi-Concept</option></select>]
        ].map(([l,el])=><div key={l}><div style={{fontSize:10,fontWeight:600,color:MUTED,marginBottom:3}}>{l}</div>{el}</div>)}

      {qType!=="Integer"&&q.options?.map((opt,i)=>{
        const l=["A","B","C","D"][i];const isSel=qType==="MCQ (Multi-Correct)"?sel?.includes(l):sel===l;

      <div style={{display:"flex",gap:16,alignItems:"flex-start"}}><div style={{fontSize:44}}>📝</div><div style={{flex:1}}>
        <div style={{fontWeight:800,fontSize:17,color:"#059669",marginBottom:4}}>JEE Mains — Full Exam Interface</div>
        <div style={{fontSize:13,color:"#374151",lineHeight:1.6,marginBottom:12}}>Authentic NTA-style · 90 Questions · 3 Hours<br/>Physics+Chemistry+Maths · SCQ: +4/−1 · Integer: +4/0</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:14}}>{[["90 Questions","30 per subject"],["3 Hours","NTA Pattern"],["SCQ +4/−1","Integer +4/0"],["Question Palette","Color coded"],["Section Tabs","Phy·Chem·Math"],["Auto Submit","On time end"]].map(([t,d])=><div key={t} style={{background:BG,borderRadius:8,padding:"8px 10px",border:"1px solid #a7f3d0"}}><div style={{fontWeight:700,fontSize:11,color:"#059669"}}>{t}</div><div style={{fontSize:9,color:MUTED}}>{d}</div></div>)}</div>
        <button onClick={()=>setMode("mains")} style={{...btn("#059669"),padding:"11px 28px",fontSize:14}}>🚀 Start JEE Mains Mock</button>
      </div></div>
    </div>
    <div style={{...card,border:`2px solid #4f46e5`,background:"linear-gradient(135deg,#eef2ff,#f5f3ff)"}}>
      <div style={{display:"flex",gap:16,alignItems:"flex-start"}}><div style={{fontSize:44}}>⚡</div><div style={{flex:1}}>
        <div style={{fontWeight:800,fontSize:17,color:"#4f46e5",marginBottom:4}}>JEE Advanced — Full Exam Interface</div>
        <div style={{fontSize:13,color:"#374151",lineHeight:1.6,marginBottom:12}}>IIT JEE Advanced · Paper 1 or 2 · 3 Hours<br/>Sec A (SCQ +3/−1) · Sec B (MCQ +4/−2) · Sec C (Integer +4/0)</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:14}}>{[["48 Questions","16 per subject"],["3 Hours","Per Paper"],["Sec A SCQ","+3/−1"],["Sec B Multi-Correct","+4/−2"],["Sec C Integer","+4/0"],["Paper 1 or 2","Choose below"]].map(([t,d])=><div key={t} style={{background:BG,borderRadius:8,padding:"8px 10px",border:"1px solid #c7d2fe"}}><div style={{fontWeight:700,fontSize:11,color:"#4f46e5"}}>{t}</div><div style={{fontSize:9,color:MUTED}}>{d}</div></div>)}</div>
        <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>

          <button onClick={()=>setMode("advanced")} style={{...btn("#4f46e5"),padding:"11px 28px",fontSize:14}}>⚡ Start Paper {paper}</button>

    <div style={{...card,background:"#fffbeb",border:"1.5px solid #fde68a"}}>
      <div style={{fontWeight:700,fontSize:13,color:"#d97706",marginBottom:6}}>💡 Tip</div>
      <div style={{fontSize:13,color:"#374151",lineHeight:1.7}}>Exam mode uses sample placeholder questions. Use the <b>🎯 Practice</b> tab to generate real AI-powered JEE questions with Gemini — customize by topic, year, difficulty, and question type.</div>
    </div>
  </div>);
}

/* ═══════════════════════════════════
   SETTINGS TAB
═══════════════════════════════════ */
function SettingsTab({apiKey,setApiKey}){
  const[input,setInput]=useState(apiKey);const[saved,setSaved]=useState(false);const[testing,setTesting]=useState(false);const[testResult,setTestResult]=useState("");
  const save=()=>{const k=input.trim();setApiKey(k);try{localStorage.setItem("jee_gemini_key",k);}catch(e){}setSaved(true);setTestResult("");setTimeout(()=>setSaved(false),2000);};
  const testKey=async()=>{
    if(!input.trim()){setTestResult("❌ Enter an API key first");return;}
    setTesting(true);setTestResult("");
    const r=await callGemini(input.trim(),[{role:"user",content:"Say: WORKING"}],"Say: WORKING",20);
    setTesting(false);
    if(!r.startsWith("❌")){setTestResult("✅ API key is working! Gemini is connected.");}
    else if(r.includes("RATE_LIMIT")){setTestResult("⏳ Key valid but rate limited. Wait 60s and test again.");}
    else if(r.includes("BAD_KEY")){setTestResult("❌ Invalid key. Copy fresh from aistudio.google.com/apikey");}
    else setTestResult("❌ "+r);
  };
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{...card,border:`2px solid #1a73e8`,background:"#f0f7ff"}}>
      <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:36}}>🤖</div>
        <div><div style={{fontWeight:800,fontSize:16,color:"#1a73e8"}}>Google Gemini API Key</div><div style={{fontSize:12,color:MUTED}}>Powered by Gemini 2.0 Flash</div></div>
      </div>
      <div style={{fontSize:13,color:"#374151",lineHeight:1.7,marginBottom:14}}>
        <b>How to get a FREE Gemini API key:</b><br/>
        1. Go to <a href="https://aistudio.google.com/apikey" target="_blank" style={{color:"#1a73e8",fontWeight:700}}>aistudio.google.com/apikey</a><br/>
        2. Sign in with your Google account<br/>
        3. Click <b>"Create API Key"</b><br/>
        4. Copy the key (starts with <b>AIza...</b>)<br/>
        5. Paste below and click Save<br/>
        <br/>
        ✅ <b>Free tier:</b> 15 requests/min, 1 million tokens/day — more than enough for JEE prep!
      </div>
      <div style={{display:"flex",gap:10,marginBottom:10,flexWrap:"wrap"}}>
        <input value={input} onChange={e=>setInput(e.target.value)} type="password" placeholder="AIza... (your Gemini API key)" style={{...inp,flex:1,minWidth:200,fontFamily:"monospace"}}/>
        <button onClick={save} style={{...btn(saved?"#059669":"#1a73e8"),flexShrink:0}}>{saved?"✓ Saved!":"💾 Save Key"}</button>
        <button onClick={testKey} disabled={testing} style={{...btn("#d97706"),flexShrink:0}}>{testing?"⏳ Testing...":"🧪 Test Key"}</button>
        {apiKey&&<button onClick={()=>{setApiKey("");setInput("");setTestResult("");try{localStorage.removeItem("jee_gemini_key");}catch(e){}}} style={{...btn("#dc2626"),flexShrink:0}}>🗑 Clear</button>}
      </div>
      {testResult&&<div style={{fontSize:12,borderRadius:8,padding:10,fontWeight:600,background:testResult.startsWith("✅")?"#ecfdf5":"#fef2f2",color:testResult.startsWith("✅")?"#059669":"#dc2626",border:`1px solid ${testResult.startsWith("✅")?"#a7f3d0":"#fecaca"}`,marginBottom:8}}>{testResult}</div>}
      <div style={{fontSize:12,borderRadius:8,padding:10,fontWeight:600,background:apiKey?"#ecfdf5":"#f1f5f9",color:apiKey?"#059669":"#64748b",border:`1px solid ${apiKey?"#a7f3d0":BORDER}`}}>
        {apiKey?"✅ Gemini API key saved — all AI features active.":"ℹ️ No API key yet. Add your key above to enable AI features."}
      </div>
    </div>
    <div style={{...card}}>
      <div style={{fontWeight:700,fontSize:14,color:TEXT,marginBottom:10}}>📋 Feature Status</div>
      {[["✅","70-Day Study Planner (Mains + Advanced) with progress tracking"],["✅","Chapter Tracker — separate Mains & Advanced with weightage bars"],["✅","JEE Mains Exam Interface — NTA authentic style, question palette"],["✅","JEE Advanced Exam Interface — Sec A/B/C with proper marking"],["🔑","AI Question Generation (Gemini 2.0 Flash) — needs API key"],["🔑","AI Step-by-Step Solutions & Explanations — needs API key"],["🔑","AI Study Tutor (multi-turn chat) — needs API key"],["🔑","PDF/Image Question Extraction — needs API key"]].map(([ic,f])=><div key={f} style={{fontSize:13,padding:"6px 0",borderBottom:`1px solid ${BG3}`,display:"flex",gap:8,alignItems:"flex-start"}}><span style={{flexShrink:0,color:ic==="✅"?"#059669":"#1a73e8"}}>{ic}</span><span style={{color:TEXT}}>{f}</span></div>)}
    </div>
    <div style={{...card,background:"#f0f4ff",border:`1.5px solid #c7d2fe`}}>
      <div style={{fontWeight:700,fontSize:13,color:"#4f46e5",marginBottom:6}}>🚀 Deploy on GitHub Pages</div>
      <div style={{fontSize:12,color:"#374151",lineHeight:1.8}}>
        1. Create a new GitHub repository<br/>
        2. Upload this <b>index.html</b> file to the repo root<br/>
        3. Go to <b>Settings → Pages → Source → main branch → / (root) → Save</b><br/>
        4. Your app will be live at <b>https://yourusername.github.io/repo-name</b><br/>
        5. Add Gemini API key once deployed via ⚙️ Settings tab
      </div>
    </div>
  </div>);
}

/* ═══════════════════════════════════
   MAIN APP
═══════════════════════════════════ */
function App(){
  const[tab,setTab]=useState("planner");
  const[apiKey,setApiKey]=useState(()=>{try{return localStorage.getItem("jee_gemini_key")||"";}catch(e){return"";}});
  const tabs=[{id:"planner",label:"📅 70-Day Plan"},{id:"tracker",label:"📊 Chapter Tracker"},{id:"practice",label:"🎯 Practice"},{id:"exam",label:"🏛️ Exam Mode"},{id:"tutor",label:"🤖 AI Tutor"},{id:"settings",label:"⚙️ Settings"}];
  return(<div style={{minHeight:"100vh",background:"#f8fafc",fontFamily:"'Segoe UI',-apple-system,sans-serif",color:TEXT}}>
    <div style={{background:"linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#1e1b4b 100%)",borderBottom:"1px solid #4338ca",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 16px rgba(79,70,229,0.2)"}}>
      <div style={{maxWidth:1100,margin:"0 auto",padding:"12px 16px 0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div>
            <div style={{color:"#c7d2fe",fontSize:9,fontFamily:"monospace",letterSpacing:3,marginBottom:2}}>JEE 2026 · 70-DAY MASTER PLAN · MAINS + ADVANCED</div>
            <div style={{fontSize:18,fontWeight:900,background:"linear-gradient(120deg,#10b981,#a5b4fc,#fbbf24)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>JEE Ultimate Study System</div>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <span style={{background:"#1a73e8",color:"#fff",fontSize:9,fontWeight:700,padding:"4px 10px",borderRadius:99}}>Gemini AI</span>
            {apiKey
              ?<span style={{background:"#059669",color:"#fff",fontSize:9,fontWeight:700,padding:"4px 10px",borderRadius:99}}>✅ AI Active</span>
              :<span onClick={()=>setTab("settings")} style={{background:"#fef3c7",color:"#d97706",fontSize:9,fontWeight:700,padding:"4px 10px",borderRadius:99,cursor:"pointer",border:"1px solid #fde68a"}}>🔑 Add Gemini Key</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:1,overflowX:"auto"}}>
          {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"9px 14px",background:tab===t.id?"#fff":"transparent",color:tab===t.id?"#1e1b4b":"#c7d2fe",border:"none",borderRadius:"9px 9px 0 0",cursor:"pointer",fontWeight:700,fontSize:12,whiteSpace:"nowrap",flexShrink:0,transition:"all 0.15s"}}>{t.label}</button>)}
        </div>
      </div>
    </div>
    <div style={{maxWidth:1100,margin:"0 auto",padding:"20px 14px"}}>
      {tab==="planner"&&<PlannerTab/>}
      {tab==="tracker"&&<TrackerTab/>}
      {tab==="practice"&&<PracticeTab apiKey={apiKey}/>}
      {tab==="exam"&&<ExamTab/>}
      {tab==="tutor"&&<TutorTab apiKey={apiKey}/>}
      {tab==="settings"&&<SettingsTab apiKey={apiKey} setApiKey={setApiKey}/>}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
