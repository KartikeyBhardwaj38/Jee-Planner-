const MODEL="gemini-1.5-flash";
function parseErr(d){
  if(!d||!d.error)return null;
  const m=(d.error.message||"").toLowerCase();
  if(d.error.code===429||m.includes("quota")||m.includes("rate")||m.includes("limit")||m.includes("exceed"))return"RATE_LIMIT";
  if(m.includes("api key")||m.includes("invalid")||d.error.code===401||d.error.code===403)return"BAD_KEY";
  return"ERR:"+d.error.message;
}
async function callAI(key,messages,sys,tokens){
  if(!key||!key.trim())return"NO_KEY";
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${key.trim()}`;
  const raw=messages.map(m=>({role:m.role==="assistant"?"model":"user",parts:[{text:String(m.content||"")}]}));
  const contents=[];
  for(const m of raw){
    if(contents.length&&contents[contents.length-1].role===m.role)contents[contents.length-1].parts[0].text+="\n"+m.parts[0].text;
    else contents.push({...m});
  }
  if(!contents.length||contents[0].role==="model")contents.unshift({role:"user",parts:[{text:"Hello"}]});
  try{
    const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({systemInstruction:{parts:[{text:sys||"You are a JEE expert."}]},contents,generationConfig:{maxOutputTokens:tokens||1000,temperature:0.7}})});
    const d=await r.json();
    const e=parseErr(d);if(e)return e;
    return d.candidates?.[0]?.content?.parts?.map(p=>p.text||"").join("")||"EMPTY";
  }catch(e){return"NET:"+e.message;}
}
async function callAIFile(key,b64,mime,prompt){
  if(!key||!key.trim())return"NO_KEY";
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${key.trim()}`;
  try{
    const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{inline_data:{mime_type:mime,data:b64}},{text:prompt}]}]})});
    const d=await r.json();const e=parseErr(d);if(e)return e;
    return d.candidates?.[0]?.content?.parts?.map(p=>p.text||"").join("")||"Nothing extracted.";
  }catch(e){return"NET:"+e.message;}
}

}

/* ════════════════════════════════════════
   TIMER HOOK
════════════════════════════════════════ */
function useTimer(total,onEnd){
  const[left,setLeft]=useState(total);const[running,setRunning]=useState(false);const ref=useRef();
  useEffect(()=>{
    if(running&&left>0){ref.current=setInterval(()=>setLeft(l=>{if(l<=1){clearInterval(ref.current);setRunning(false);onEnd&&onEnd();return 0;}return l-1;}),1000);}
    return()=>clearInterval(ref.current);
  },[running]);
  const fmt=s=>`${String(Math.floor(s/3600)).padStart(2,"0")}:${String(Math.floor((s%3600)/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  return{left,fmt:fmt(left),pct:left/total,start:()=>setRunning(true)};
}

  const[chatMsg,setChatMsg]=useState("");
  const[chatLoad,setChatLoad]=useState(false);
  const[score,setScore]=useState({c:0,w:0,tot:0});
  const fileRef=useRef();
  const[pdfRes,setPdfRes]=useState("");
  const[pdfLoad,setPdfLoad]=useState(false);
  const chs=DATA[subj][exam];
  const acc=score.tot?Math.round(score.c/score.tot*100):0;
  const qTypes=exam==="advanced"?["SCQ","MCQ","Integer"]:["SCQ","Integer"];
  const yrs=Array.from({length:exam==="advanced"?48:24},(_,i)=>2025-i);

  const genQ=async()=>{
    if(!apiKey){setQ({err:"NO_KEY"});return;}
    setLoad(true);setQ(null);setSel(null);setIntA("");setSubmitted(false);setChat([]);
    const t=topic||chs[Math.floor(Math.random()*chs.length)].ch;
    const prompt=`Generate a ${exam==="advanced"?"JEE Advanced":"JEE Mains"} ${year} ${diff} ${qType} question.\nSubject: ${subj}, Topic: "${t}".\nIMPORTANT: Return ONLY a JSON object. No markdown. No text before or after. Just the raw JSON:\n{"question":"full question text","options":["A) text","B) text","C) text","D) text"],"correct":"A","hint":"one line hint","solution":"CONCEPT: ...\\nFORMULA: ...\\nSOLUTION: step 1...\\nstep 2...\\nANSWER: ...\\nCOMMON ERROR: ..."}`;
    const r=await callAI(apiKey,[{role:"user",content:prompt}],"You are a JEE expert. Respond with ONLY a valid JSON object. Do not include any markdown formatting, backticks, or text outside the JSON.",1400);
    const isApiErr=r==="NO_KEY"||r==="RATE_LIMIT"||r==="BAD_KEY"||r==="EMPTY"||r.startsWith("NET:")||r.startsWith("ERR:");
    if(isApiErr){setQ({err:r});}
    else{
      try{
        const clean=r.replace(/```json|```/g,"").replace(/^[^{]*/,"").replace(/[^}]*$/,"").trim();
        setQ(JSON.parse(clean));
      }catch(e){
        setQ({err:"PARSE",raw:r.slice(0,200)});
      }
    }
    setLoad(false);
  };

  const submit=()=>{
    if(!q||q.err)return;
    const a=qType==="Integer"?intA:sel;
    if(!a)return;
    const ok=qType==="MCQ"?q.correct.split("").every(l=>a.includes(l))&&a.split("").every(l=>q.correct.includes(l)):a===q.correct;
    setSubmitted(true);
    setScore(s=>({c:s.c+(ok?1:0),w:s.w+(!ok?1:0),tot:s.tot+1}));
  };

  const sendChat=async()=>{
    if(!chatMsg.trim()||!q||q.err)return;
    if(!apiKey){setChat(c=>[...c,{role:"user",content:chatMsg},{role:"assistant",content:"NO_KEY"}]);setChatMsg("");return;}
    const msgs=[...chat,{role:"user",content:chatMsg}];
    setChat(msgs);setChatMsg("");setChatLoad(true);
    const r=await callAI(apiKey,msgs,`JEE tutor. Q: "${q.question}". Correct: "${q.correct}". Be concise.`,600);
    setChat(c=>[...c,{role:"assistant",content:r}]);
    setChatLoad(false);
  };

  const handlePDF=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    if(!apiKey){setPdfRes("NO_KEY");return;}
    setPdfLoad(true);setPdfRes("");
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
    const r=await callAIFile(apiKey,b64,file.type||"application/pdf","Extract all JEE questions from this file. For each: question number, full text, options A-D, correct answer, subject, topic, type.");
    setPdfRes(r);setPdfLoad(false);e.target.value="";
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",gap:3,background:"#f1f5f9",padding:3,borderRadius:10}}>
          {[["mains","📝 Mains","#059669"],["advanced","⚡ Advanced","#4f46e5"]].map(([v,l,c])=>(
            <button key={v} onClick={()=>{setExam(v);setQ(null);setQType("SCQ");setTopic("");}} style={{...btn(exam===v?c:"transparent",exam===v?"#fff":MUTED),borderRadius:8,padding:"6px 14px",fontSize:12}}>{l}</button>
          ))}
        </div>
        {[["Done",score.tot,"#4f46e5"],["✓",score.c,"#059669"],["✗",score.w,"#dc2626"],["Acc",`${acc}%`,acc>=60?"#059669":"#dc2626"]].map(([l,v,c])=>(
          <div key={l} style={{...card,padding:"5px 10px",textAlign:"center",minWidth:44}}><div style={{fontSize:16,fontWeight:800,color:c}}>{v}</div><div style={{fontSize:9,color:MUTED}}>{l}</div></div>
        ))}
      </div>
      <div style={{...card}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:12}}>
          {[
            ["Subject",<select value={subj} onChange={e=>{setSubj(e.target.value);setTopic("");}} style={inp}>{Object.keys(DATA).map(s=><option key={s}>{s}</option>)}</select>],
            ["Topic",<select value={topic} onChange={e=>setTopic(e.target.value)} style={inp}><option value="">🎲 Random</option>{chs.map(c=><option key={c.ch}>{c.ch}</option>)}</select>],
            ["Year",<select value={year} onChange={e=>setYear(e.target.value)} style={inp}>{yrs.map(y=><option key={y}>{y}</option>)}</select>],
            ["Type",<select value={qType} onChange={e=>setQType(e.target.value)} style={inp}>{qTypes.map(t=><option key={t}>{t}</option>)}</select>],
            ["Difficulty",<select value={diff} onChange={e=>setDiff(e.target.value)} style={inp}>{["Easy","Medium","Hard","Very Hard"].map(d=><option key={d}>{d}</option>)}</select>],
            ["API calls",<div style={{padding:"8px 0",fontSize:12,color:"#059669",fontWeight:700}}>✅ 1 call per question<br/><span style={{fontSize:10,color:MUTED,fontWeight:400}}>Solution loads instantly on submit</span></div>]
          ].map(([l,el])=>(
            <div key={l}><div style={{fontSize:10,fontWeight:600,color:MUTED,marginBottom:3}}>{l}</div>{el}</div>
          ))}
        </div>
        <button onClick={genQ} disabled={load} style={{...btn("linear-gradient(135deg,#4f46e5,#7c3aed)"),width:"100%",padding:12,fontSize:14,opacity:load?0.7:1}}>
          {load?"⏳ Generating...":"🎯 Generate Question"}
        </button>
      </div>

      {q&&q.err==="PARSE"&&(
        <div style={{background:"#fef2f2",border:"1.5px solid #fecaca",borderRadius:10,padding:13,fontSize:13,color:"#991b1b"}}>
          <b>❌ Parse Error</b> — AI returned invalid format. <button onClick={genQ} style={{...btn("#dc2626"),padding:"3px 10px",fontSize:11,marginLeft:8}}>Try Again</button>
          <div style={{fontSize:11,marginTop:6,color:MUTED,fontFamily:"monospace"}}>{q.raw}</div>
        </div>
      )}
      {q&&q.err&&q.err!=="PARSE"&&<AIError r={q.err}/>}

      {q&&!q.err&&(
        <div style={{...card}}>
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
            {[[subj,DATA[subj].color],[diff,"#d97706"],[`${exam==="advanced"?"⚡":"📝"} ${year}`,exam==="advanced"?"#4f46e5":"#059669"],["Gemini AI","#1a73e8"]].map(([t,c])=>(
              <span key={t} style={{...pill(c)}}>{t}</span>
            ))}
          </div>
          <div style={{fontSize:14,lineHeight:1.85,padding:13,background:BG2,borderRadius:10,marginBottom:12,border:`1px solid ${BORDER}`,whiteSpace:"pre-wrap",color:TEXT}}>
            {q.question}
          </div>
          {qType!=="Integer"&&(q.options||[]).map((o,i)=>{
            const l=["A","B","C","D"][i];
            const isSel=qType==="MCQ"?sel&&sel.includes(l):sel===l;
            const isCorr=submitted&&(qType==="MCQ"?q.correct&&q.correct.includes(l):l===q.correct);
            const isWrong=submitted&&isSel&&!isCorr;
            return(
              <div key={i} onClick={()=>{if(submitted)return;if(qType==="MCQ")setSel(s=>s?(s.includes(l)?s.replace(l,""):s+l):l);else setSel(l);}} style={{padding:"10px 13px",borderRadius:9,marginBottom:6,cursor:submitted?"default":"pointer",border:`2px solid ${isCorr?"#059669":isWrong?"#dc2626":isSel?"#4f46e5":BORDER}`,background:isCorr?"#ecfdf5":isWrong?"#fef2f2":isSel?"#eef2ff":BG,fontSize:13,fontWeight:isSel||isCorr?600:400}}>
                <span style={{fontWeight:700,color:"#4f46e5",marginRight:7}}>{l})</span>
                {o.replace(/^[A-D]\)\s*/,"")}
                {isCorr&&" ✅"}{isWrong&&" ❌"}
              </div>
            );
          })}
          {qType==="Integer"&&!submitted&&(
            <input type="number" value={intA} onChange={e=>setIntA(e.target.value)} placeholder="Enter integer answer" style={{...inp,maxWidth:180,fontSize:15,marginBottom:10}}/>
          )}
          {qType==="Integer"&&submitted&&(
            <div style={{padding:10,borderRadius:9,marginBottom:10,fontWeight:600,background:intA===q.correct?"#ecfdf5":"#fef2f2",border:`1px solid ${intA===q.correct?"#059669":"#dc2626"}`}}>
              Your answer: {intA} | Correct: {q.correct} {intA===q.correct?"✅":"❌"}
            </div>
          )}
          {!submitted&&<button onClick={submit} style={{...btn("#059669"),width:"100%",padding:10}}>Submit Answer</button>}
          {q.hint&&!submitted&&(
            <div style={{marginTop:8,background:"#fffbeb",borderRadius:8,padding:9,fontSize:12,color:"#d97706",border:"1px solid #fde68a"}}>💡 Hint: {q.hint}</div>
          )}
          {submitted&&(
            <div style={{marginTop:10,background:"#ecfdf5",borderRadius:10,padding:13,border:"1px solid #a7f3d0"}}>
              <div style={{fontWeight:700,color:"#059669",marginBottom:6}}>
                ✅ Solution <span style={{fontSize:10,color:MUTED,fontWeight:400}}>— instant, no extra API call</span>
              </div>
              <div style={{fontSize:13,lineHeight:1.8,color:TEXT,whiteSpace:"pre-wrap"}}>{q.solution||"Solution not available. Try regenerating."}</div>
            </div>
          )}
          {submitted&&(
            <button onClick={genQ} style={{...btn("linear-gradient(135deg,#4f46e5,#7c3aed)"),width:"100%",marginTop:10}}>⚡ Next Question</button>
          )}
        </div>
      )}

      {q&&!q.err&&(
        <div style={{...card,border:`1.5px solid #c7d2fe`}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>💬 Doubt Chat</div>
          <div style={{maxHeight:160,overflowY:"auto",display:"flex",flexDirection:"column",gap:6,marginBottom:8}}>
            {chat.map((m,i)=>{
              if(m.role==="assistant"&&(m.content==="NO_KEY"||m.content==="RATE_LIMIT"||m.content==="BAD_KEY"))return<div key={i} style={{alignSelf:"flex-start",maxWidth:"90%"}}><AIError r={m.content}/></div>;
              return(<div key={i} style={{alignSelf:m.role==="user"?"flex-end":"flex-start",maxWidth:"82%",background:m.role==="user"?"linear-gradient(135deg,#4f46e5,#7c3aed)":"#f8fafc",color:m.role==="user"?"#fff":TEXT,borderRadius:9,padding:"7px 11px",fontSize:12,border:m.role==="assistant"?`1px solid ${BORDER}`:"none"}}>{m.content}</div>);
            })}
            {chatLoad&&<div style={{fontSize:12,color:MUTED}}>⏳ Thinking...</div>}
          </div>
          <div style={{display:"flex",gap:7}}>
            <input value={chatMsg} onChange={e=>setChatMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&sendChat()} placeholder="Ask about this question..." style={{...inp,flex:1}}/>
            <button onClick={sendChat} disabled={chatLoad} style={{...btn(),flexShrink:0}}>Send</button>
          </div>
        </div>
      )}

      <div style={{...card}}>
        <div style={{fontWeight:700,fontSize:13,marginBottom:6}}>📄 Upload JEE PDF / Image</div>
        <div onClick={()=>fileRef.current&&fileRef.current.click()} style={{border:`2px dashed ${BORDER}`,borderRadius:10,padding:14,textAlign:"center",cursor:"pointer",background:BG2}}>
          <div style={{fontSize:28}}>📁</div>
          <div style={{fontSize:12,color:MUTED,marginTop:3}}>{pdfLoad?"⏳ Gemini reading file...":"Click to upload JEE PYQ PDF or image"}</div>
          <input ref={fileRef} type="file" accept=".pdf,image/*" style={{display:"none"}} onChange={handlePDF}/>
        </div>
        {pdfRes&&(pdfRes==="NO_KEY"?<div style={{marginTop:8}}><AIError r="NO_KEY"/></div>:<div style={{marginTop:8,background:BG2,borderRadius:9,padding:11,fontSize:12,lineHeight:1.7,maxHeight:240,overflowY:"auto",whiteSpace:"pre-wrap",border:`1px solid ${BORDER}`}}>{pdfRes}</div>)}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   AI TUTOR TAB
════════════════════════════════════════ */
function TutorTab({apiKey}){
  const[chat,setChat]=useState([{role:"assistant",content:"👋 JEE AI Tutor powered by Gemini!\n\nI can help with:\n• Concept explanations with examples\n• Step-by-step solutions with formulae\n• JEE Mains vs Advanced strategy\n• Formula sheets & memory tricks\n\n💡 Add your Gemini key in ⚙️ Settings to start chatting."}]);
  const[msg,setMsg]=useState("");
  const[load,setLoad]=useState(false);
  const ref=useRef();
  const QUICK=["Gauss Law — all 3 symmetries","GOC carbocation stability order","Rolling without slipping","King's rule of integration","JEE Advanced strategy 2026","CFT vs VBT comparison","Electrochemistry formula sheet","Rotational motion formulas"];
  const send=async(m)=>{
    const t=m||msg;if(!t.trim())return;
    if(!apiKey){setChat(c=>[...c,{role:"user",content:t},{role:"assistant",content:"NO_KEY"}]);setMsg("");return;}
    const nc=[...chat,{role:"user",content:t}];
    setChat(nc);setMsg("");setLoad(true);
    const r=await callAI(apiKey,nc,"You are an elite JEE tutor. Give detailed responses with clear structure, formulae, and examples. Use plain text formatting.",1500);
    setChat(c=>[...c,{role:"assistant",content:r}]);
    setLoad(false);
    setTimeout(()=>{if(ref.current)ref.current.scrollTo(0,ref.current.scrollHeight);},100);
  };
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
        {QUICK.map(p=>(
          <button key={p} onClick={()=>send(p)} style={{fontSize:11,padding:"4px 9px",borderRadius:99,border:`1px solid ${BORDER}`,background:BG2,cursor:"pointer",color:TEXT}}>{p}</button>
        ))}
      </div>
      <div style={{...card,padding:0,overflow:"hidden"}}>
        <div ref={ref} style={{height:420,overflowY:"auto",padding:14,display:"flex",flexDirection:"column",gap:9}}>
          {chat.map((m,i)=>{
            if(m.role==="assistant"&&(m.content==="NO_KEY"||m.content==="RATE_LIMIT"||m.content==="BAD_KEY"||m.content.startsWith("NET:")))return<div key={i} style={{alignSelf:"flex-start",maxWidth:"90%"}}><AIError r={m.content}/></div>;
            return(
              <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                <div style={{maxWidth:"85%",padding:"9px 13px",borderRadius:11,fontSize:13,lineHeight:1.7,background:m.role==="user"?"linear-gradient(135deg,#4f46e5,#7c3aed)":"#f8fafc",color:m.role==="user"?"#fff":TEXT,border:m.role==="assistant"?`1px solid ${BORDER}`:"none",whiteSpace:"pre-wrap",wordBreak:"break-word"}}>
                  {m.role==="assistant"&&<div style={{fontSize:8,fontWeight:800,color:"#1a73e8",marginBottom:3,letterSpacing:2}}>GEMINI TUTOR</div>}
                  {m.content}
                </div>
              </div>
            );
          })}
          {load&&<div style={{alignSelf:"flex-start",padding:"9px 13px",borderRadius:11,background:"#f8fafc",border:`1px solid ${BORDER}`,fontSize:13,color:MUTED}}>⏳ Thinking...</div>}
        </div>
        <div style={{borderTop:`1px solid ${BORDER}`,padding:10,display:"flex",gap:7}}>
          <textarea value={msg} onChange={e=>setMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&(e.preventDefault(),send())} placeholder="Ask any JEE question... (Enter to send)" rows={2} style={{...inp,flex:1,resize:"none",height:46}}/>
          <button onClick={()=>send()} disabled={load} style={{...btn(),padding:"0 16px",flexShrink:0}}>Send</button>
        </div>
      </div>
    </div>
  );
}

          <input value={input} onChange={e=>setInput(e.target.value)} type="password" placeholder="AIzaSy... paste your Gemini API key here" style={{...inp,flex:1,minWidth:200,fontFamily:"monospace",fontSize:12}}/>
          <button onClick={save} style={{...btn(saved?"#059669":"#1a73e8"),flexShrink:0}}>{saved?"✓ Saved!":"💾 Save Key"}</button>
          <button onClick={test} disabled={testing} style={{...btn("#d97706"),flexShrink:0}}>{testing?"⏳ Testing...":"🧪 Test Key"}</button>
          {apiKey&&<button onClick={()=>{setApiKey("");setInput("");setTestRes("");try{localStorage.removeItem("jee_gemini_key");}catch(e){}}} style={{...btn("#dc2626"),flexShrink:0}}>🗑 Clear</button>}
        </div>
        {testRes&&<div style={{fontSize:12,padding:10,borderRadius:8,fontWeight:600,background:ok?"#ecfdf5":bad?"#fef2f2":"#fffbeb",color:ok?"#059669":bad?"#dc2626":"#d97706",border:`1px solid ${ok?"#a7f3d0":bad?"#fecaca":"#fde68a"}`,marginBottom:8}}>{testRes}</div>}
        <div style={{fontSize:12,padding:10,borderRadius:8,fontWeight:600,background:apiKey?"#ecfdf5":"#f1f5f9",color:apiKey?"#059669":"#64748b",border:`1px solid ${apiKey?"#a7f3d0":BORDER}`}}>
          {apiKey?"✅ API key saved — AI features active.":"ℹ️ No key saved. Add your Gemini key above."}
        </div>
      </div>
      <div style={{...card}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:10}}>📋 Features</div>
        {[["✅","70-Day Study Planner — Phase 1 & 2 with progress tracking"],["✅","Chapter Tracker — Mains & Advanced with weightage bars"],["✅","JEE Mains Exam Interface — NTA style, 90Q, question palette"],["✅","JEE Advanced Exam Interface — Sec A/B/C, proper marking"],["🔑","AI Question Generation — 1 Gemini call per question"],["🔑","Solution shown instantly on submit — 0 extra API calls"],["🔑","Doubt Chat — follow-up questions on any question"],["🔑","AI Tutor — multi-turn study conversation"],["🔑","PDF/Image Extraction — upload JEE papers"]].map(([ic,f])=>(
          <div key={f} style={{fontSize:13,padding:"6px 0",borderBottom:`1px solid #f1f5f9`,display:"flex",gap:8}}>
            <span>{ic}</span><span style={{color:TEXT}}>{f}</span>
          </div>
        ))}
      </div>
      <div style={{...card,background:"#f0f4ff",border:"1.5px solid #c7d2fe",fontSize:13,color:"#374151",lineHeight:1.85}}>
        <b style={{color:"#4f46e5"}}>🚀 Deploy on GitHub Pages</b><br/>
        1. Create a GitHub repo → upload this <b>index.html</b> as the only file<br/>
        2. Settings → Pages → Branch: main → Folder: / (root) → Save<br/>
        3. Your app goes live at <b>https://yourusername.github.io/reponame</b><br/>
        4. Add your Gemini key via ⚙️ Settings after deploying
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   MAIN APP
════════════════════════════════════════ */
function App(){
  const[tab,setTab]=useState("planner");
  const[apiKey,setApiKey]=useState(()=>{try{return localStorage.getItem("jee_gemini_key")||"";}catch(e){return "";}});
  const TABS=[["planner","📅 Plan"],["tracker","📊 Tracker"],["practice","🎯 Practice"],["exam","🏛️ Exam"],["tutor","🤖 Tutor"],["settings","⚙️ Settings"]];
  return(
    <div style={{minHeight:"100vh",background:"#f8fafc"}}>
      <div style={{background:"linear-gradient(135deg,#1e1b4b,#312e81)",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(79,70,229,0.2)"}}>
        <div style={{maxWidth:1080,margin:"0 auto",padding:"10px 14px 0"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div>
              <div style={{color:"#c7d2fe",fontSize:8,letterSpacing:3,marginBottom:1}}>JEE 2026 · 70-DAY · MAINS + ADVANCED</div>
              <div style={{fontSize:17,fontWeight:900,background:"linear-gradient(120deg,#10b981,#a5b4fc,#fbbf24)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>JEE Ultimate Study System</div>
            </div>
            <div style={{display:"flex",gap:5,alignItems:"center"}}>
              <span style={{background:"#1a73e8",color:"#fff",fontSize:9,fontWeight:700,padding:"3px 8px",borderRadius:99}}>Gemini AI</span>
              {apiKey
                ?<span style={{background:"#059669",color:"#fff",fontSize:9,fontWeight:700,padding:"3px 8px",borderRadius:99}}>✅ AI Active</span>
                :<span onClick={()=>setTab("settings")} style={{background:"#fef3c7",color:"#d97706",fontSize:9,fontWeight:700,padding:"3px 8px",borderRadius:99,cursor:"pointer",border:"1px solid #fde68a"}}>🔑 Add Key</span>
              }
            </div>
          </div>
          <div style={{display:"flex",gap:1,overflowX:"auto"}}>
            {TABS.map(([id,label])=>(
              <button key={id} onClick={()=>setTab(id)} style={{padding:"8px 13px",background:tab===id?"#fff":"transparent",color:tab===id?"#1e1b4b":"#c7d2fe",border:"none",borderRadius:"8px 8px 0 0",cursor:"pointer",fontWeight:700,fontSize:12,whiteSpace:"nowrap",flexShrink:0}}>
                {label}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div style={{maxWidth:1080,margin:"0 auto",padding:"18px 12px"}}>
        {tab==="planner"&&<PlannerTab/>}
        {tab==="tracker"&&<TrackerTab/>}
        {tab==="practice"&&<PracticeTab apiKey={apiKey}/>}
        {tab==="exam"&&<ExamTab/>}
        {tab==="tutor"&&<TutorTab apiKey={apiKey}/>}
        {tab==="settings"&&<SettingsTab apiKey={apiKey} setApiKey={setApiKey}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
