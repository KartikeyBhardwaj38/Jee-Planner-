<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>JEE 2026 — Elite Study System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;
  --bg2:#0d0d1a;
  --bg3:#131320;
  --card:#16162a;
  --card2:#1c1c30;
  --border:#2a2a45;
  --border2:#3a3a5c;
  --gold:#c9a84c;
  --gold2:#e8c96a;
  --gold3:#f5dfa0;
  --cream:#f0ebe0;
  --text:#e8e3d8;
  --muted:#8585a8;
  --blue:#5b9cf6;
  --green:#4ade80;
  --red:#f87171;
  --purple:#a78bfa;
  --orange:#fb923c;
  --font-display:'Playfair Display',serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);overflow-x:hidden;font-size:16px}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(201,168,76,0.06) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(91,156,246,0.05) 0%,transparent 60%);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
select{color:var(--text);background:var(--bg3)}
select option{background:var(--bg2);color:var(--text)}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(201,168,76,0.2)}50%{box-shadow:0 0 40px rgba(201,168,76,0.5)}}
@keyframes gradflow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* ─── LOGIN PAGE ─── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:20px}
.login-wrap::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 100% 100% at 50% 0%,rgba(201,168,76,0.12) 0%,transparent 70%);pointer-events:none}
.login-box{width:100%;max-width:440px;position:relative;animation:fadeUp 0.6s ease}
.login-card{background:var(--card);border:1.5px solid var(--border2);border-radius:24px;padding:48px 44px;position:relative;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(201,168,76,0.1)}
.login-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold2),var(--gold),transparent)}
.login-ornament{font-size:56px;text-align:center;margin-bottom:6px;filter:drop-shadow(0 0 20px rgba(201,168,76,0.4))}
.login-title{font-family:var(--font-display);font-size:30px;font-weight:900;text-align:center;background:linear-gradient(135deg,var(--gold3),var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.login-sub{text-align:center;color:var(--muted);font-size:15px;margin-bottom:36px;letter-spacing:0.3px}
.login-inp{width:100%;background:var(--bg2);border:1.5px solid var(--border2);border-radius:12px;padding:14px 18px;font-size:15px;font-family:var(--font-body);color:var(--text);outline:none;transition:all 0.2s;margin-bottom:12px}
.login-inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.12)}
.login-inp::placeholder{color:var(--muted)}
.login-btn{width:100%;padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,#b8903c,var(--gold),var(--gold2));color:#1a1200;font-family:var(--font-display);font-size:16px;font-weight:700;cursor:pointer;letter-spacing:0.5px;transition:all 0.2s;margin-top:4px;position:relative;overflow:hidden}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(201,168,76,0.4)}
.login-btn:active{transform:translateY(0)}
.login-err{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:var(--red);border-radius:10px;padding:10px 14px;font-size:14px;margin-top:10px;text-align:center}
.login-quote{margin-top:32px;text-align:center;font-style:italic;font-size:14px;color:var(--muted);line-height:1.6;padding-top:24px;border-top:1px solid var(--border)}
.login-quote span{color:var(--gold);display:block;font-size:12px;margin-top:6px;font-style:normal;letter-spacing:1px}

/* ─── NAVBAR ─── */
.navbar{background:rgba(7,7,15,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;padding:0 24px}
.navbar-inner{max-width:1200px;margin:0 auto}
.navbar-top{display:flex;justify-content:space-between;align-items:center;padding:14px 0 10px}
.brand-eyebrow{font-size:10px;letter-spacing:4px;color:var(--gold);font-weight:600;text-transform:uppercase;margin-bottom:3px}
.brand-name{font-family:var(--font-display);font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--gold3),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.navbar-badges{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:99px;letter-spacing:0.3px;cursor:pointer}
.badge-gold{background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid rgba(201,168,76,0.3)}
.badge-green{background:rgba(74,222,128,0.12);color:var(--green);border:1px solid rgba(74,222,128,0.25)}
.badge-warn{background:rgba(251,146,60,0.12);color:var(--orange);border:1px solid rgba(251,146,60,0.3)}
.tab-row{display:flex;gap:2px;overflow-x:auto;padding-bottom:0}
.tab-row::-webkit-scrollbar{height:0}
.tab-btn{padding:11px 18px;background:none;border:none;border-bottom:2.5px solid transparent;color:var(--muted);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap;letter-spacing:0.2px}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-btn:hover:not(.active){color:var(--text)}

/* ─── QUOTE BANNER ─── */
.quote-banner{background:linear-gradient(135deg,rgba(201,168,76,0.08),rgba(91,156,246,0.06));border:1px solid rgba(201,168,76,0.2);border-radius:16px;padding:18px 24px;margin-bottom:20px;position:relative;overflow:hidden;animation:fadeUp 0.5s ease}
.quote-banner::before{content:"\201C";position:absolute;top:-10px;left:16px;font-family:var(--font-display);font-size:100px;color:rgba(201,168,76,0.1);line-height:1;pointer-events:none}
.quote-text{font-family:var(--font-display);font-size:17px;font-style:italic;color:var(--gold3);line-height:1.65;padding-left:12px}
.quote-author{font-size:12px;color:var(--muted);margin-top:6px;letter-spacing:1.5px;text-transform:uppercase;padding-left:12px}

/* ─── CARDS ─── */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;position:relative;overflow:hidden;transition:border-color 0.2s}
.card:hover{border-color:var(--border2)}
.card::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.015),transparent);pointer-events:none;border-radius:inherit}
.card-gold{border-color:rgba(201,168,76,0.25);background:linear-gradient(135deg,rgba(201,168,76,0.06),var(--card))}
.card-title{font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--cream);margin-bottom:4px}
.card-sub{font-size:13px;color:var(--muted)}

/* ─── STATS GRID ─── */
.stat-num{font-family:var(--font-display);font-size:32px;font-weight:900;line-height:1.1}
.stat-label{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:0.5px;margin-top:3px}

/* ─── BUTTONS ─── */
.btn{border:none;border-radius:10px;padding:11px 20px;font-family:var(--font-body);font-weight:600;font-size:14px;cursor:pointer;transition:all 0.2s;letter-spacing:0.2px}
.btn-gold{background:linear-gradient(135deg,#b8903c,var(--gold));color:#1a1200}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(201,168,76,0.35)}
.btn-glass{background:rgba(255,255,255,0.06);color:var(--text);border:1px solid var(--border2)}
.btn-glass:hover{background:rgba(255,255,255,0.1)}
.btn-blue{background:rgba(91,156,246,0.15);color:var(--blue);border:1px solid rgba(91,156,246,0.25)}
.btn-red{background:rgba(248,113,113,0.12);color:var(--red);border:1px solid rgba(248,113,113,0.25)}
.btn-green{background:rgba(74,222,128,0.12);color:var(--green);border:1px solid rgba(74,222,128,0.25)}
.btn-primary{background:linear-gradient(135deg,#3d6fd4,var(--blue));color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(91,156,246,0.35)}
.btn-full{width:100%}
.btn-big{padding:14px 24px;font-size:15px;border-radius:12px}

/* ─── INPUTS ─── */
.inp{background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;padding:11px 15px;font-size:14px;font-family:var(--font-body);color:var(--text);outline:none;width:100%;transition:border-color 0.2s}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--muted)}
.inp-label{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;letter-spacing:0.5px;text-transform:uppercase}

/* ─── PILLS ─── */
.pill{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;letter-spacing:0.3px}
.pill-gold{background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid rgba(201,168,76,0.25)}
.pill-blue{background:rgba(91,156,246,0.12);color:var(--blue);border:1px solid rgba(91,156,246,0.2)}
.pill-green{background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.2)}
.pill-red{background:rgba(248,113,113,0.1);color:var(--red);border:1px solid rgba(248,113,113,0.2)}
.pill-purple{background:rgba(167,139,250,0.1);color:var(--purple);border:1px solid rgba(167,139,250,0.2)}
.pill-muted{background:rgba(133,133,168,0.1);color:var(--muted);border:1px solid rgba(133,133,168,0.15)}

/* ─── PROGRESS BARS ─── */
.prog-track{background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width 0.5s ease}
.prog-gold{background:linear-gradient(90deg,#b8903c,var(--gold),var(--gold2))}
.prog-blue{background:linear-gradient(90deg,#3d6fd4,var(--blue))}
.prog-green{background:linear-gradient(90deg,#16a34a,var(--green))}
.prog-rainbow{background:linear-gradient(90deg,var(--green),var(--blue),var(--gold))}

/* ─── POMODORO ─── */
.pomo-ring{width:160px;height:160px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:3px solid var(--border);position:relative;margin:0 auto}
.pomo-time{font-family:var(--font-mono);font-size:36px;font-weight:600;color:var(--cream)}
.pomo-mode{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:4px}

/* ─── EXAM INTERFACE ─── */
.exam-header{background:linear-gradient(135deg,#070714,#0f0f24);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
.exam-timer{font-family:var(--font-mono);font-size:24px;font-weight:700;background:var(--bg3);padding:8px 18px;border-radius:10px;border:1px solid var(--border2)}
.qnum{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.15s;border:2px solid transparent;font-family:var(--font-mono)}

/* ─── CHAT BUBBLES ─── */
.bubble-user{background:linear-gradient(135deg,#2d4a8a,#3d5fa0);color:var(--cream);border-radius:16px 16px 4px 16px;padding:12px 16px;font-size:14px;line-height:1.6;max-width:82%;align-self:flex-end}
.bubble-ai{background:var(--card2);border:1px solid var(--border2);color:var(--text);border-radius:16px 16px 16px 4px;padding:12px 16px;font-size:14px;line-height:1.6;max-width:82%;align-self:flex-start}
.bubble-ai-tag{font-size:9px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}

/* ─── FORMULA CARD ─── */
.formula-card{background:var(--bg2);border:1px solid rgba(201,168,76,0.2);border-radius:12px;padding:16px;transition:all 0.2s;cursor:pointer}
.formula-card:hover{border-color:var(--gold);background:rgba(201,168,76,0.05)}
.formula-latex{font-family:var(--font-mono);font-size:16px;color:var(--gold2);padding:10px;background:rgba(0,0,0,0.3);border-radius:8px;margin-top:8px;text-align:center;letter-spacing:0.5px}

/* ─── STUDY NOTES ─── */
.note-card{background:var(--bg2);border-left:3px solid var(--gold);border-radius:0 12px 12px 0;padding:14px 16px;margin-bottom:10px;animation:fadeUp 0.3s ease}

/* ─── STREAK WIDGET ─── */
.streak-day{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;transition:all 0.2s}
.streak-done{background:rgba(74,222,128,0.2);color:var(--green);border:1px solid rgba(74,222,128,0.3)}
.streak-today{background:rgba(201,168,76,0.2);color:var(--gold);border:1px solid rgba(201,168,76,0.4);animation:glow 2s ease infinite}
.streak-miss{background:rgba(255,255,255,0.04);color:var(--muted);border:1px solid var(--border)}

/* ─── ERROR COMPONENTS ─── */
.ai-err{border-radius:12px;padding:14px 18px;font-size:14px;font-weight:500;display:flex;align-items:flex-start;gap:10px;line-height:1.5}
.ai-err-warn{background:rgba(251,146,60,0.1);border:1px solid rgba(251,146,60,0.25);color:var(--orange)}
.ai-err-red{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.25);color:var(--red)}

/* ─── MOBILE ─── */
@media(max-width:640px){
  .navbar{padding:0 14px}
  .login-card{padding:36px 28px}
  .brand-name{font-size:18px}
  .tab-btn{padding:10px 12px;font-size:13px}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useCallback} = React;

/* ═══════════════════════════════════════════
   MOTIVATION QUOTES
═══════════════════════════════════════════ */
const QUOTES=[
  {q:"The secret of getting ahead is getting started.",a:"Mark Twain"},
  {q:"It does not matter how slowly you go as long as you do not stop.",a:"Confucius"},
  {q:"Success is not final, failure is not fatal — it is the courage to continue that counts.",a:"Winston Churchill"},
  {q:"You don't have to be great to start, but you have to start to be great.",a:"Zig Ziglar"},
  {q:"The expert in anything was once a beginner.",a:"Helen Hayes"},
  {q:"An investment in knowledge pays the best interest.",a:"Benjamin Franklin"},
  {q:"The more that you read, the more things you will know.",a:"Dr. Seuss"},
  {q:"Education is not preparation for life; education is life itself.",a:"John Dewey"},
  {q:"The beautiful thing about learning is nobody can take it away from you.",a:"B.B. King"},
  {q:"Mathematics is not about numbers, equations or algorithms — it is about understanding.",a:"William Paul Thurston"},
  {q:"The only way to learn mathematics is to do mathematics.",a:"Paul Halmos"},
  {q:"Physics is the study of the most fundamental aspects of reality.",a:"Richard Feynman"},
  {q:"In the middle of difficulty lies opportunity.",a:"Albert Einstein"},
  {q:"Strive not to be a success, but rather to be of value.",a:"Albert Einstein"},
  {q:"The harder I work, the luckier I get.",a:"Samuel Goldwyn"},
  {q:"Problems cannot be solved at the same level of awareness that created them.",a:"Albert Einstein"},
  {q:"Pure mathematics is the poetry of logical ideas.",a:"Albert Einstein"},
  {q:"Do not worry about your difficulties in mathematics. Mine are still greater.",a:"Albert Einstein"},
  {q:"Every great advance in science has issued from a new audacity of imagination.",a:"John Dewey"},
  {q:"The only source of knowledge is experience.",a:"Albert Einstein"},
  {q:"Failure is the condiment that gives success its flavor.",a:"Truman Capote"},
  {q:"Your time is limited, don't waste it living someone else's life.",a:"Steve Jobs"},
  {q:"Hard work beats talent when talent doesn't work hard.",a:"Tim Notke"},
  {q:"Excellence is never an accident. It is the result of high intention and sincere effort.",a:"Aristotle"},
  {q:"Believe you can and you're halfway there.",a:"Theodore Roosevelt"},
];
const todayQuote=QUOTES[new Date().getDate()%QUOTES.length];

/* ═══════════════════════════════════════════
   GEMINI API
═══════════════════════════════════════════ */
const MODEL="gemini-1.5-flash";
function parseErr(d){
  if(!d||!d.error)return null;
  const m=(d.error.message||"").toLowerCase();
  if(d.error.code===429||m.includes("quota")||m.includes("rate")||m.includes("limit")||m.includes("exceed"))return"RATE_LIMIT";
  if(m.includes("api key")||m.includes("invalid")||d.error.code===401||d.error.code===403)return"BAD_KEY";
  return"ERR:"+d.error.message;
}
async function callAI(key,messages,sys,tokens){
  if(!key||!key.trim())return"NO_KEY";
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${key.trim()}`;
  const raw=messages.map(m=>({role:m.role==="assistant"?"model":"user",parts:[{text:String(m.content||"")}]}));
  const contents=[];
  for(const m of raw){if(contents.length&&contents[contents.length-1].role===m.role)contents[contents.length-1].parts[0].text+="\n"+m.parts[0].text;else contents.push({...m});}
  if(!contents.length||contents[0].role==="model")contents.unshift({role:"user",parts:[{text:"Hello"}]});
  try{
    const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({systemInstruction:{parts:[{text:sys||"You are a JEE expert."}]},contents,generationConfig:{maxOutputTokens:tokens||1000,temperature:0.7}})});
    const d=await r.json();const e=parseErr(d);if(e)return e;
    return d.candidates?.[0]?.content?.parts?.map(p=>p.text||"").join("")||"EMPTY";
  }catch(e){return"NET:"+e.message;}
}
async function callAIFile(key,b64,mime,prompt){
  if(!key||!key.trim())return"NO_KEY";
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${key.trim()}`;
  try{
    const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{inline_data:{mime_type:mime,data:b64}},{text:prompt}]}]})});
    const d=await r.json();const e=parseErr(d);if(e)return e;
    return d.candidates?.[0]?.content?.parts?.map(p=>p.text||"").join("")||"Nothing extracted.";
  }catch(e){return"NET:"+e.message;}
}
function AIError({r}){
  if(r==="NO_KEY")return<div className="ai-err ai-err-warn"><span>⚠️</span><span><b>No API Key</b> — go to ⚙️ Settings and save your Gemini key to activate AI features.</span></div>;
  if(r==="RATE_LIMIT")return<div className="ai-err ai-err-warn"><span>⏳</span><span><b>Rate Limit Hit</b> — Gemini free tier: 15 req/min. Wait 60 seconds and try again.</span></div>;
  if(r==="BAD_KEY")return<div className="ai-err ai-err-red"><span>❌</span><span><b>Invalid API Key</b> — get a fresh key from <a href="https://aistudio.google.com/apikey" target="_blank" style={{color:"var(--blue)"}}>aistudio.google.com/apikey</a></span></div>;
  return<div className="ai-err ai-err-red"><span>❌</span><span>{r}</span></div>;
}

const DATA={
  /*
   MAINS weightage = 5-year PYQ analysis (2020-2025), actual % from PW/SuperTutor data
   JEE Advanced = 20-year trend (2005-2025), SATHEE IIT-K analysis + ExamSide data
   wt scale: 10=6%+  9=5-6%  8=4-5%  7=3-4%  6=2-3%  5=1.5-2%  4=1-1.5%  3=<1%
  */
  Physics:{color:"#4f46e5",icon:"⚛️",
    mains:[
      {ch:"Current Electricity",                            wt:10,tag:"★★★",pct:"6.57%",q25:"Jan:23,Apr:19"},
      {ch:"Ray Optics & Optical Instruments",               wt:9, tag:"★★★",pct:"5.04%",q25:"Jan:23,Apr:19"},
      {ch:"Semiconductor Electronics & Logic Gates",        wt:9, tag:"★★★",pct:"4.75%",q25:"consistent",mo:true},
      {ch:"Rotational Motion & MOI",                        wt:9, tag:"★★★",pct:"4.31%",q25:"Jan:14,Apr:13"},
      {ch:"Gravitation",                                    wt:9, tag:"★★★",pct:"4.49%",q25:"consistent"},

/* ═══════════════════════════════════════════
   TIMER HOOK
═══════════════════════════════════════════ */
function useTimer(total,onEnd){
  const[left,setLeft]=useState(total);const[running,setRunning]=useState(false);const ref=useRef();
  useEffect(()=>{if(running&&left>0){ref.current=setInterval(()=>setLeft(l=>{if(l<=1){clearInterval(ref.current);setRunning(false);onEnd&&onEnd();return 0;}return l-1;}),1000);}return()=>clearInterval(ref.current);},[running]);
  const fmt=s=>`${String(Math.floor(s/3600)).padStart(2,"0")}:${String(Math.floor((s%3600)/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  return{left,fmt:fmt(left),pct:left/total,start:()=>setRunning(true),reset:()=>{setRunning(false);setLeft(total);}};
}

        <div style={{display:"flex",background:"var(--bg2)",padding:4,borderRadius:12,border:"1px solid var(--border)"}}>
          {[["mains","📝 JEE Mains","var(--green)"],["advanced","⚡ Advanced","var(--blue)"]].map(([v,l,c])=>(
            <button key={v} onClick={()=>setMode(v)} className="btn" style={{fontSize:13,padding:"7px 16px",borderRadius:9,background:mode===v?c+"20":"transparent",color:mode===v?c:"var(--muted)",border:mode===v?`1px solid ${c}30`:"1px solid transparent"}}>{l}</button>
          ))}
        </div>
        {Object.entries(DATA).map(([s,d])=>(
          <button key={s} onClick={()=>setSubj(s)} className="btn" style={{fontSize:13,background:subj===s?d.color+"18":"rgba(255,255,255,0.04)",color:subj===s?d.color:"var(--muted)",border:`1px solid ${subj===s?d.color+"40":"var(--border)"}`}}>{d.icon} {s}</button>
        ))}
      </div>
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div><span style={{fontFamily:"var(--font-display)",fontSize:18,fontWeight:700,color:C}}>{DATA[subj].icon} {subj}</span><span style={{fontSize:13,color:"var(--muted)",marginLeft:8}}>{chs.length} chapters</span></div>
          <span style={{fontSize:14,fontWeight:700,color:C}}>{chs.filter(c=>done[mode][c.ch]).length}/{chs.length} ({pct}%)</span>
        </div>
        <div className="prog-track" style={{height:8,marginBottom:18}}>
          <div className="prog-fill" style={{width:`${pct}%`,background:C,transition:"width 0.5s"}}/>

                <div style={{width:22,height:22,borderRadius:6,border:`2px solid ${isDone?C:"var(--border2)"}`,background:isDone?C:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.2s"}}>

/* ═══════════════════════════════════════════
   PRACTICE TAB
═══════════════════════════════════════════ */
function PracticeTab({apiKey}){
  const[exam,setExam]=useState("mains");const[subj,setSubj]=useState("Physics");const[topic,setTopic]=useState("");const[year,setYear]=useState("2025");const[qType,setQType]=useState("SCQ");const[diff,setDiff]=useState("Medium");
  const[q,setQ]=useState(null);const[load,setLoad]=useState(false);const[sel,setSel]=useState(null);const[intA,setIntA]=useState("");const[submitted,setSubmitted]=useState(false);
  const[chat,setChat]=useState([]);const[chatMsg,setChatMsg]=useState("");const[chatLoad,setChatLoad]=useState(false);
  const[score,setScore]=useState({c:0,w:0,tot:0});
  const fileRef=useRef();const[pdfRes,setPdfRes]=useState("");const[pdfLoad,setPdfLoad]=useState(false);
  const chs=DATA[subj][exam];const acc=score.tot?Math.round(score.c/score.tot*100):0;
  const qTypes=exam==="advanced"?["SCQ","MCQ","Integer"]:["SCQ","Integer"];
  const yrs=Array.from({length:exam==="advanced"?48:24},(_,i)=>2025-i);
  const SC={"Physics":"var(--blue)","Chemistry":"var(--green)","Maths":"var(--gold)"};
  const genQ=async()=>{
    if(!apiKey){setQ({err:"NO_KEY"});return;}
    setLoad(true);setQ(null);setSel(null);setIntA("");setSubmitted(false);setChat([]);
    const t=topic||chs[Math.floor(Math.random()*chs.length)].ch;
    const prompt=`Generate a ${exam==="advanced"?"JEE Advanced":"JEE Mains"} ${year} ${diff} ${qType} question.\nSubject: ${subj}, Topic: "${t}".\nReturn ONLY valid JSON (no markdown, no extra text):\n{"question":"full question","options":["A) ...","B) ...","C) ...","D) ..."],"correct":"A","hint":"one line hint","solution":"CONCEPT: ...\\nFORMULA: ...\\nSOLUTION: step by step...\\nANSWER: ...\\nCOMMON ERROR: ..."}`;
    const r=await callAI(apiKey,[{role:"user",content:prompt}],"JEE expert. Return ONLY valid JSON. No markdown.",1400);
    const isErr=r==="NO_KEY"||r==="RATE_LIMIT"||r==="BAD_KEY"||r==="EMPTY"||r.startsWith("NET:")||r.startsWith("ERR:");
    if(isErr)setQ({err:r});
    else{try{const clean=r.replace(/```json|```/g,"").replace(/^[^{]*/,"").replace(/[^}]*$/,"").trim();setQ(JSON.parse(clean));}catch(e){setQ({err:"PARSE:"+r.slice(0,200)});}}
    setLoad(false);
  };
  const submit=()=>{
    if(!q||q.err)return;const a=qType==="Integer"?intA:sel;if(!a)return;
    const ok=qType==="MCQ"?q.correct.split("").every(l=>a.includes(l))&&a.split("").every(l=>q.correct.includes(l)):a===q.correct;
    setSubmitted(true);setScore(s=>({c:s.c+(ok?1:0),w:s.w+(!ok?1:0),tot:s.tot+1}));
  };
  const sendChat=async()=>{
    if(!chatMsg.trim()||!q||q.err)return;
    const msgs=[...chat,{role:"user",content:chatMsg}];setChat(msgs);setChatMsg("");setChatLoad(true);
    const r=await callAI(apiKey,msgs,`JEE tutor. Q: "${q.question}". Correct: "${q.correct}". Answer concisely.`,600);
    setChat(c=>[...c,{role:"assistant",content:r}]);setChatLoad(false);
  };
  const handlePDF=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    setPdfLoad(true);setPdfRes("");
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
    const r=await callAIFile(apiKey,b64,file.type||"application/pdf","Extract all JEE questions. For each: number, full text, options A-D, correct answer, subject, topic, type.");
    setPdfRes(r);setPdfLoad(false);e.target.value="";
  };
  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",background:"var(--bg2)",padding:4,borderRadius:12,border:"1px solid var(--border)"}}>
          {[["mains","📝 Mains","var(--green)"],["advanced","⚡ Advanced","var(--blue)"]].map(([v,l,c])=>(
            <button key={v} onClick={()=>{setExam(v);setQ(null);setQType("SCQ");setTopic("");}} className="btn" style={{fontSize:13,padding:"7px 16px",borderRadius:9,background:exam===v?c+"20":"transparent",color:exam===v?c:"var(--muted)",border:exam===v?`1px solid ${c}30`:"1px solid transparent"}}>{l}</button>
          ))}
        </div>
        {[["Done",score.tot,"var(--blue)"],["✓ Correct",score.c,"var(--green)"],["✗ Wrong",score.w,"var(--red)"],["Accuracy",`${acc}%`,acc>=60?"var(--green)":"var(--red)"]].map(([l,v,c])=>(
          <div key={l} className="card" style={{padding:"8px 14px",textAlign:"center",minWidth:60}}>
            <div style={{fontFamily:"var(--font-mono)",fontSize:20,fontWeight:700,color:c}}>{v}</div>
            <div style={{fontSize:11,color:"var(--muted)"}}>{l}</div>
          </div>
        ))}
      </div>
      <div className="card card-gold">
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
          {[["Subject",<select value={subj} onChange={e=>{setSubj(e.target.value);setTopic("");}} className="inp">{Object.keys(DATA).map(s=><option key={s}>{s}</option>)}</select>],
            ["Topic",<select value={topic} onChange={e=>setTopic(e.target.value)} className="inp"><option value="">🎲 Random</option>{chs.map(c=><option key={c.ch}>{c.ch}</option>)}</select>],
            ["Year",<select value={year} onChange={e=>setYear(e.target.value)} className="inp">{yrs.map(y=><option key={y}>{y}</option>)}</select>],
            ["Q Type",<select value={qType} onChange={e=>setQType(e.target.value)} className="inp">{qTypes.map(t=><option key={t}>{t}</option>)}</select>],
            ["Difficulty",<select value={diff} onChange={e=>setDiff(e.target.value)} className="inp">{["Easy","Medium","Hard","Very Hard"].map(d=><option key={d}>{d}</option>)}</select>],
            ["API",<div style={{padding:"10px 0",fontSize:13,color:"var(--green)",fontWeight:600}}>✅ 1 call/question<br/><span style={{fontSize:11,color:"var(--muted)",fontWeight:400}}>Solution pre-loaded, 0 extra calls</span></div>]
          ].map(([l,el])=>(
            <div key={l}><div className="inp-label">{l}</div>{el}</div>
          ))}
        </div>
        <button onClick={genQ} disabled={load} className="btn btn-gold btn-big btn-full" style={{fontSize:15,opacity:load?0.7:1}}>
          {load?"⏳ Generating with Gemini AI...":"🎯 Generate Question (1 API Call)"}
        </button>
      </div>
      {q&&q.err&&<AIError r={q.err.startsWith("PARSE:")?"ERR: AI returned invalid format. Try again.":q.err}/>}
      {q&&!q.err&&(
        <div className="card">
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
            {[[subj,SC[subj]],[diff,diff==="Hard"||diff==="Very Hard"?"var(--red)":"var(--gold)"],[`${year}`,exam==="advanced"?"var(--blue)":"var(--green)"],["Gemini AI","var(--gold)"]].map(([t,c])=>(
              <span key={t} className="pill" style={{background:c+"15",color:c,border:`1px solid ${c}25`}}>{t}</span>
            ))}
          </div>
          <div style={{fontSize:16,lineHeight:1.85,padding:18,background:"var(--bg2)",borderRadius:12,marginBottom:14,border:"1px solid var(--border2)",whiteSpace:"pre-wrap",color:"var(--cream)",fontWeight:400}}>
            {q.question}
          </div>
          {qType!=="Integer"&&(q.options||[]).map((o,i)=>{
            const l=["A","B","C","D"][i];const isSel=qType==="MCQ"?sel&&sel.includes(l):sel===l;
            const isCorr=submitted&&(qType==="MCQ"?q.correct&&q.correct.includes(l):l===q.correct);
            const isWrong=submitted&&isSel&&!isCorr;
            return(
              <div key={i} onClick={()=>{if(submitted)return;if(qType==="MCQ")setSel(s=>s?(s.includes(l)?s.replace(l,""):s+l):l);else setSel(l);}} style={{padding:"13px 16px",borderRadius:11,marginBottom:8,cursor:submitted?"default":"pointer",border:`2px solid ${isCorr?"var(--green)":isWrong?"var(--red)":isSel?"var(--gold)":"var(--border2)"}`,background:isCorr?"rgba(74,222,128,0.08)":isWrong?"rgba(248,113,113,0.08)":isSel?"rgba(201,168,76,0.08)":"var(--bg2)",fontSize:15,transition:"all 0.15s"}}>
                <span style={{fontFamily:"var(--font-mono)",fontWeight:700,color:"var(--gold)",marginRight:10}}>{l})</span>
                <span style={{color:isSel||isCorr?"var(--cream)":"var(--text)"}}>{o.replace(/^[A-D]\)\s*/,"")}</span>
                {isCorr&&<span style={{marginLeft:8,color:"var(--green)"}}>✅</span>}
                {isWrong&&<span style={{marginLeft:8,color:"var(--red)"}}>❌</span>}
              </div>
            );
          })}
          {qType==="Integer"&&!submitted&&<input type="number" value={intA} onChange={e=>setIntA(e.target.value)} placeholder="Enter integer answer" className="inp" style={{maxWidth:200,fontSize:16,marginBottom:12}}/>}
          {qType==="Integer"&&submitted&&<div style={{padding:12,borderRadius:10,marginBottom:12,fontWeight:600,background:intA===q.correct?"rgba(74,222,128,0.08)":"rgba(248,113,113,0.08)",border:`1px solid ${intA===q.correct?"var(--green)":"var(--red)"}`}}>Your answer: {intA} | Correct: {q.correct} {intA===q.correct?"✅":"❌"}</div>}
          {!submitted&&<button onClick={submit} className="btn btn-full btn-big" style={{background:"linear-gradient(135deg,#16a34a,var(--green))",color:"#fff",marginTop:4}}>Submit Answer</button>}
          {q.hint&&!submitted&&<div style={{marginTop:10,background:"rgba(201,168,76,0.08)",borderRadius:10,padding:12,fontSize:14,color:"var(--gold3)",border:"1px solid rgba(201,168,76,0.2)"}}>💡 Hint: {q.hint}</div>}
          {submitted&&(
            <div style={{marginTop:12,background:"rgba(74,222,128,0.06)",borderRadius:12,padding:16,border:"1px solid rgba(74,222,128,0.2)"}}>
              <div style={{fontFamily:"var(--font-display)",fontWeight:700,color:"var(--green)",marginBottom:8,fontSize:16}}>✅ Solution <span style={{fontSize:12,color:"var(--muted)",fontWeight:400,fontFamily:"var(--font-body)"}}>— instant, 0 extra API calls</span></div>
              <div style={{fontSize:14,lineHeight:1.85,color:"var(--text)",whiteSpace:"pre-wrap"}}>{q.solution||"Regenerate for solution."}</div>
            </div>
          )}
          {submitted&&<button onClick={genQ} className="btn btn-gold btn-full btn-big" style={{marginTop:12}}>⚡ Next Question →</button>}
        </div>
      )}
      {q&&!q.err&&(
        <div className="card" style={{border:"1px solid rgba(91,156,246,0.25)"}}>
          <div style={{fontFamily:"var(--font-display)",fontSize:16,fontWeight:700,marginBottom:14}}>💬 Doubt Chat</div>
          <div style={{maxHeight:180,overflowY:"auto",display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
            {chat.map((m,i)=>{
              const isAiErr=m.role==="assistant"&&(m.content==="NO_KEY"||m.content==="RATE_LIMIT"||m.content==="BAD_KEY");
              if(isAiErr)return<div key={i}><AIError r={m.content}/></div>;
              return<div key={i} className={m.role==="user"?"bubble-user":"bubble-ai"} style={{alignSelf:m.role==="user"?"flex-end":"flex-start"}}>{m.role==="assistant"&&<div className="bubble-ai-tag">Gemini Tutor</div>}{m.content}</div>;
            })}
            {chatLoad&&<div className="bubble-ai"><div className="bubble-ai-tag">Gemini Tutor</div><span style={{color:"var(--muted)"}}>Thinking...</span></div>}
          </div>
          <div style={{display:"flex",gap:8}}>
            <input value={chatMsg} onChange={e=>setChatMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&sendChat()} placeholder="Ask about this question..." className="inp" style={{flex:1}}/>

          <div style={{fontFamily:"var(--font-display)",fontSize:22,fontWeight:800,color:"var(--blue)",marginBottom:6}}>JEE Advanced — Full Mock Exam</div>
          <div style={{fontSize:15,color:"var(--muted)",lineHeight:1.65,marginBottom:18}}>48 Questions · 3 Hours · Paper 1 or 2<br/>Sec A: SCQ +3/−1 · Sec B: MCQ +4/−2 · Sec C: Integer +4/0</div>
          <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            <div style={{display:"flex",background:"var(--bg2)",padding:4,borderRadius:10,border:"1px solid var(--border)"}}>
              {[1,2].map(p=><button key={p} onClick={()=>setPaper(p)} className="btn" style={{fontSize:13,padding:"6px 16px",borderRadius:8,background:paper===p?"rgba(91,156,246,0.2)":"transparent",color:paper===p?"var(--blue)":"var(--muted)",border:paper===p?"1px solid rgba(91,156,246,0.3)":"1px solid transparent"}}>Paper {p}</button>)}
            </div>
            <button onClick={()=>setMode("advanced")} className="btn btn-big btn-primary">⚡ Start Paper {paper}</button>
          </div>
        </div>
      </div>
    </div>
    <div className="card" style={{background:"rgba(201,168,76,0.05)",border:"1px solid rgba(201,168,76,0.2)",fontSize:14,color:"var(--muted)",lineHeight:1.7}}>
      💡 Exam mode uses <b style={{color:"var(--text)"}}>sample placeholder questions</b>. For real AI-generated JEE questions, use the <b style={{color:"var(--gold)"}}>🎯 Practice</b> tab.
    </div>
  </div>);}

/* ═══════════════════════════════════════════
   SETTINGS TAB
═══════════════════════════════════════════ */
function SettingsTab({apiKey,setApiKey,userName}){
  const[input,setInput]=useState(apiKey);const[saved,setSaved]=useState(false);const[testing,setTesting]=useState(false);const[testRes,setTestRes]=useState("");const[show,setShow]=useState(false);
  const[newPass,setNewPass]=useState("");const[passSaved,setPassSaved]=useState(false);
  const save=()=>{const k=input.trim();setApiKey(k);try{localStorage.setItem("jee_gemini_key",k);}catch(e){}setSaved(true);setTimeout(()=>setSaved(false),2200);};
  const test=async()=>{if(!input.trim()){setTestRes("⚠ Enter a key first.");return;}setTesting(true);setTestRes("");const r=await callAI(input.trim(),[{role:"user",content:"Reply: OK"}],"Reply: OK",20);setTesting(false);if(r==="RATE_LIMIT")setTestRes("⏳ Key valid but rate limited. Wait 60s.");else if(r==="BAD_KEY")setTestRes("❌ Invalid key. Get fresh from aistudio.google.com/apikey");else if(r.startsWith("NET:")||r.startsWith("ERR:"))setTestRes("❌ "+r);else setTestRes("✅ Gemini connected and working!");};
  const savePass=()=>{if(!newPass.trim()||newPass.length<4){setTestRes("Password must be 4+ characters");return;}try{localStorage.setItem("jee_password",newPass);}catch(e){}setPassSaved(true);setNewPass("");setTimeout(()=>setPassSaved(false),2000);};
  const ok=testRes.startsWith("✅"),bad=testRes.startsWith("❌");
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div className="card card-gold" style={{padding:28}}>
      <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:20}}>
        <div style={{fontSize:40,filter:"drop-shadow(0 0 15px rgba(26,115,232,0.5))"}}>🤖</div>
        <div><div style={{fontFamily:"var(--font-display)",fontSize:20,fontWeight:700,color:"#4a8fff"}}>Google Gemini API Key</div><div style={{fontSize:13,color:"var(--muted)"}}>gemini-1.5-flash · 100% Free · No billing</div></div>
      </div>
      <div style={{fontSize:14,color:"var(--muted)",lineHeight:1.9,marginBottom:20,background:"rgba(74,138,255,0.06)",padding:16,borderRadius:12,border:"1px solid rgba(74,138,255,0.15)"}}>
        <b style={{color:"var(--text)"}}>Get your FREE key in 30 seconds:</b><br/>
        1. Open <a href="https://aistudio.google.com/apikey" target="_blank" style={{color:"var(--blue)",fontWeight:600}}>aistudio.google.com/apikey</a><br/>
        2. Sign in with Google → click <b style={{color:"var(--text)"}}>Create API Key</b><br/>
        3. Copy key (starts with <span style={{fontFamily:"var(--font-mono)",color:"var(--gold)"}}>AIzaSy...</span>)<br/>
        4. Paste below → Save → Test<br/><br/>
        <b style={{color:"var(--text)"}}>Free limits:</b> 15 req/min · 1,500/day · completely free ✅
      </div>
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        <div style={{position:"relative",flex:1,minWidth:200}}>
          <input value={input} onChange={e=>setInput(e.target.value)} type={show?"text":"password"} placeholder="AIzaSy... paste your Gemini API key" className="inp" style={{fontFamily:"var(--font-mono)",fontSize:13,paddingRight:46}}/>
          <button onClick={()=>setShow(s=>!s)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:16}}>{show?"🙈":"👁️"}</button>
        </div>
        <button onClick={save} className={`btn ${saved?"btn-green":"btn-gold"}`}>{saved?"✓ Saved!":"💾 Save"}</button>
        <button onClick={test} disabled={testing} className="btn btn-glass">{testing?"⏳":"🧪 Test"}</button>
        {apiKey&&<button onClick={()=>{setApiKey("");setInput("");try{localStorage.removeItem("jee_gemini_key");}catch(e){}}} className="btn btn-red">🗑</button>}
      </div>
      {testRes&&<div style={{fontSize:13,padding:12,borderRadius:10,fontWeight:500,background:ok?"rgba(74,222,128,0.08)":bad?"rgba(248,113,113,0.08)":"rgba(251,146,60,0.08)",color:ok?"var(--green)":bad?"var(--red)":"var(--orange)",border:`1px solid ${ok?"rgba(74,222,128,0.2)":bad?"rgba(248,113,113,0.2)":"rgba(251,146,60,0.2)"}`,marginBottom:10}}>{testRes}</div>}
      <div style={{fontSize:13,padding:12,borderRadius:10,fontWeight:500,background:apiKey?"rgba(74,222,128,0.06)":"rgba(255,255,255,0.04)",color:apiKey?"var(--green)":"var(--muted)",border:`1px solid ${apiKey?"rgba(74,222,128,0.15)":"var(--border)"}`}}>
        {apiKey?"✅ API key saved — all AI features active.":"ℹ️ No key saved. AI features require a Gemini key."}
      </div>
    </div>
    <div className="card">
      <div style={{fontFamily:"var(--font-display)",fontSize:17,fontWeight:700,marginBottom:14}}>🔒 Change Login Password</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <input value={newPass} onChange={e=>setNewPass(e.target.value)} type="password" placeholder="New password (min 4 chars)" className="inp" style={{flex:1,minWidth:200}}/>
        <button onClick={savePass} className={`btn ${passSaved?"btn-green":"btn-gold"}`}>{passSaved?"✓ Saved!":"💾 Change Password"}</button>
      </div>
      <div style={{fontSize:12,color:"var(--muted)",marginTop:8}}>Default password is <span style={{fontFamily:"var(--font-mono)",color:"var(--gold)"}}>JEE2026</span></div>
    </div>
    <div className="card">
      <div style={{fontFamily:"var(--font-display)",fontSize:17,fontWeight:700,marginBottom:14}}>📋 All Features</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
        {[["✅","70-Day Study Planner — PYQ-ordered chapters"],["✅","Chapter Tracker — Mains & Advanced weightages"],["✅","JEE Mains Exam Interface (NTA style)"],["✅","JEE Advanced Exam Interface (Sec A/B/C)"],["✅","Pomodoro Focus Timer — 8 sessions"],["✅","Study Notes — saved locally"],["✅","Formula Flashcards — 20+ formulas"],["✅","Study Streak Tracker — 14-day view"],["✅","Daily Motivation Quotes — auto-rotate"],["✅","Login Page with password"],["🔑","AI Question Generator — 1 Gemini call"],["🔑","Instant Solution — 0 extra calls on submit"],["🔑","Doubt Chat — per question"],["🔑","AI Study Tutor — multi-turn chat"],["🔑","PDF/Image Extraction — upload JEE papers"]].map(([ic,f])=>(
          <div key={f} style={{fontSize:13,padding:"8px 10px",borderRadius:8,background:"var(--bg2)",border:"1px solid var(--border)",display:"flex",gap:8}}>
            <span>{ic}</span><span style={{color:"var(--text)"}}>{f}</span>
          </div>
        ))}
      </div>
    </div>
    <div className="card" style={{background:"rgba(91,156,246,0.04)",border:"1px solid rgba(91,156,246,0.2)",fontSize:14,color:"var(--muted)",lineHeight:1.9}}>
      <b style={{color:"var(--blue)"}}>🚀 Deploy on GitHub Pages</b><br/>
      1. Create GitHub repo → upload <b style={{color:"var(--text)"}}>index.html</b> to root<br/>
      2. Settings → Pages → Branch: main → Folder: / (root) → Save<br/>
      3. Live at <b style={{color:"var(--text)"}}>https://yourusername.github.io/repo-name</b><br/>
      4. Set Gemini key via ⚙️ Settings on any device
    </div>
  </div>);}

/* ═══════════════════════════════════════════
   HOME DASHBOARD
═══════════════════════════════════════════ */
function HomeTab({userName,apiKey}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      <QuoteBanner userName={userName}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <PomodoroWidget/>
        <StreakWidget/>
      </div>
      <StudyNotes/>
      <FormulaCards/>
    </div>
  );
}

/* ═══════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════ */
function App(){
  const[loggedIn,setLoggedIn]=useState(()=>{try{return!!localStorage.getItem("jee_user");}catch(e){return false;}});
  const[userName,setUserName]=useState(()=>{try{return localStorage.getItem("jee_user")||"Scholar";}catch(e){return"Scholar";}});
  const[tab,setTab]=useState("home");
  const[apiKey,setApiKey]=useState(()=>{try{return localStorage.getItem("jee_gemini_key")||"";}catch(e){return"";}});
  if(!loggedIn)return<LoginPage onLogin={n=>{setUserName(n);setLoggedIn(true);}}/>;
  const TABS=[["home","🏠 Home"],["planner","📅 Plan"],["tracker","📊 Tracker"],["practice","🎯 Practice"],["exam","🏛️ Exam"],["tutor","🤖 Tutor"],["settings","⚙️ Settings"]];
  return(
    <div style={{minHeight:"100vh",background:"var(--bg)",position:"relative",zIndex:1}}>
      <nav className="navbar">
        <div className="navbar-inner">
          <div className="navbar-top">
            <div>
              <div className="brand-eyebrow">JEE 2026 · Elite Study System</div>
              <div className="brand-name">IIT Pathfinder</div>
            </div>
            <div className="navbar-badges">
              <span className="badge badge-gold">Gemini AI</span>
              {apiKey?<span className="badge badge-green">✅ AI Active</span>:<span className="badge badge-warn" onClick={()=>setTab("settings")} style={{cursor:"pointer"}}>🔑 Add Key</span>}
              <span className="badge badge-gold">{userName}</span>
              <button onClick={()=>{try{localStorage.removeItem("jee_user");}catch(e){}setLoggedIn(false);}} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:12,padding:"4px 8px"}}>Sign out</button>
            </div>
          </div>
          <div className="tab-row">
            {TABS.map(([id,label])=><button key={id} onClick={()=>setTab(id)} className={`tab-btn ${tab===id?"active":""}`}>{label}</button>)}
          </div>
        </div>
      </nav>
      <div style={{maxWidth:1200,margin:"0 auto",padding:"24px 16px"}}>
        {tab==="home"&&<HomeTab userName={userName} apiKey={apiKey}/>}
        {tab==="planner"&&<PlannerTab/>}
        {tab==="tracker"&&<TrackerTab/>}
        {tab==="practice"&&<PracticeTab apiKey={apiKey}/>}
        {tab==="exam"&&<ExamTab/>}
        {tab==="tutor"&&<TutorTab apiKey={apiKey}/>}
        {tab==="settings"&&<SettingsTab apiKey={apiKey} setApiKey={setApiKey} userName={userName}/>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
